<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Planner</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Geologica:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      var(--tg-theme-bg-color, #0f0f0f);
      --bg2:     var(--tg-theme-secondary-bg-color, #1a1a1a);
      --text:    var(--tg-theme-text-color, #f0f0f0);
      --hint:    var(--tg-theme-hint-color, #888);
      --accent:  #e879a0;
      --accent2: #7c6af7;
      --ok:      #4ade80;
      --danger:  #f87171;
      --warn:    #fbbf24;
      --r:       18px;
      --rs:      12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Geologica', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 110px; font-weight: 300; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* header */
    .header { padding: 20px 20px 0; display: flex; align-items: center; gap: 14px; opacity: 0; animation: up .5s .1s forwards; }
    .avatar { width: 48px; height: 48px; border-radius: 50%; overflow: hidden; background: linear-gradient(135deg,var(--accent),var(--accent2)); display: flex; align-items: center; justify-content: center; font-family:'Unbounded',sans-serif; font-size:18px; font-weight:700; color:#fff; flex-shrink:0; }
    .avatar img { width:100%; height:100%; object-fit:cover; }
    .htext h1 { font-family:'Unbounded',sans-serif; font-size:16px; font-weight:600; }
    .htext .status { font-size:12px; color:var(--hint); display:flex; align-items:center; gap:4px; margin-top:2px; }
    .sdot { width:6px; height:6px; border-radius:50%; background:var(--hint); transition:background .3s; }
    .sdot.ok { background:var(--ok); }

    /* back */
    .back { display:flex; align-items:center; gap:8px; padding:20px 20px 0; font-size:14px; color:var(--accent); cursor:pointer; width:fit-content; opacity:0; animation:up .3s .05s forwards; }

    /* tabs */
    .tabs { display:flex; gap:8px; padding:20px 20px 0; opacity:0; animation:up .5s .2s forwards; }
    .tab { flex:1; padding:10px 0; text-align:center; font-family:'Unbounded',sans-serif; font-size:11px; border-radius:var(--rs); background:var(--bg2); color:var(--hint); cursor:pointer; transition:all .25s; border:none; outline:none; }
    .tab.active { background:var(--accent); color:#fff; }

    /* filters */
    .filters { display:flex; gap:8px; padding:14px 20px 0; overflow-x:auto; scrollbar-width:none; opacity:0; animation:up .5s .3s forwards; }
    .filters::-webkit-scrollbar { display:none; }
    .fb { flex-shrink:0; padding:7px 14px; border-radius:100px; font-size:12px; background:var(--bg2); color:var(--hint); cursor:pointer; transition:all .2s; border:none; font-family:'Geologica',sans-serif; }
    .fb.active { background:var(--accent); color:#fff; }

    /* section */
    .sec { margin:16px 20px 0; opacity:0; animation:up .5s .35s forwards; }
    .sec-lbl { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--hint); font-family:'Unbounded',sans-serif; margin-bottom:10px; }

    /* list */
    .lst { display:flex; flex-direction:column; gap:8px; }

    /* task card */
    .tc { background:var(--bg2); border-radius:var(--r); padding:14px 16px; display:flex; align-items:center; gap:12px; animation:up .3s both; }
    .tc.done { opacity:.4; }
    .tc.done .tt { text-decoration:line-through; }
    .chk { width:24px; height:24px; border-radius:50%; border:2px solid var(--hint); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .2s; cursor:pointer; }
    .tc.done .chk { background:var(--ok); border-color:var(--ok); }
    .chk svg { display:none; }
    .tc.done .chk svg { display:block; }
    .tb { flex:1; min-width:0; cursor:pointer; }
    .tt { font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .tm { font-size:11px; color:var(--hint); margin-top:3px; display:flex; align-items:center; gap:6px; }
    .badge { font-size:10px; padding:2px 7px; border-radius:100px; font-weight:500; }
    .bd { background:rgba(124,106,247,.2); color:var(--accent2); }
    .bdate { background:rgba(232,121,160,.2); color:var(--accent); }
    .bs { background:rgba(251,191,36,.15); color:var(--warn); }
    /* task actions */
    .ta { display:flex; gap:6px; flex-shrink:0; }
    .icon-btn { width:30px; height:30px; border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s; background:transparent; }
    .icon-btn.edit   { color:var(--hint); }
    .icon-btn.edit:active   { background:rgba(255,255,255,.08); }
    .icon-btn.del    { color:var(--danger); }
    .icon-btn.del:active    { background:rgba(248,113,113,.12); }

    /* group card */
    .gc { background:var(--bg2); border-radius:var(--r); padding:16px; display:flex; align-items:center; gap:14px; cursor:pointer; transition:transform .15s; animation:up .3s both; }
    .gc:active { transform:scale(.98); }
    .gi { width:44px; height:44px; border-radius:14px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:20px; }
    .gi.own  { background:linear-gradient(135deg,var(--accent2),var(--accent)); }
    .gi.mem  { background:linear-gradient(135deg,#3a3a3a,#555); }
    .ginfo { flex:1; min-width:0; }
    .gname { font-size:14px; font-weight:500; }
    .gmeta { font-size:12px; color:var(--hint); margin-top:2px; }
    .garr  { color:var(--hint); font-size:20px; }

    /* group detail */
    .gdh { margin:16px 20px 0; padding:20px; background:var(--bg2); border-radius:var(--r); opacity:0; animation:up .4s .1s forwards; }
    .gdtitle { font-family:'Unbounded',sans-serif; font-size:18px; font-weight:600; }
    .gdmeta  { font-size:12px; color:var(--hint); margin-top:6px; }
    .gacts   { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
    .abtn { padding:10px 12px; border-radius:var(--rs); font-size:12px; font-family:'Unbounded',sans-serif; cursor:pointer; transition:all .2s; border:none; display:flex; align-items:center; justify-content:center; gap:6px; }
    .a-invite { background:rgba(232,121,160,.15); color:var(--accent); }
    .a-delete { background:rgba(248,113,113,.12); color:var(--danger); }

    /* member card */
    .mc { background:var(--bg2); border-radius:var(--r); padding:14px 16px; display:flex; align-items:center; gap:12px; animation:up .3s both; }
    .mav { width:38px; height:38px; border-radius:50%; flex-shrink:0; background:linear-gradient(135deg,var(--accent2),var(--accent)); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:600; color:#fff; font-family:'Unbounded',sans-serif; }
    .mi { flex:1; min-width:0; }
    .mn { font-size:14px; }
    .mu { font-size:12px; color:var(--hint); margin-top:2px; }
    .mrole { font-size:10px; padding:3px 8px; border-radius:100px; white-space:nowrap; }
    .ro { background:rgba(251,191,36,.15); color:var(--warn); }
    .rm { background:rgba(255,255,255,.08); color:var(--hint); }
    .rem-btn { width:32px; height:32px; border-radius:50%; background:rgba(248,113,113,.12); color:var(--danger); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .rem-btn:active { background:rgba(248,113,113,.25); }

    /* empty */
    .empty { text-align:center; padding:48px 20px; color:var(--hint); }
    .ei { font-size:40px; margin-bottom:12px; }
    .empty p { font-size:14px; line-height:1.5; }

    /* fab */
    .fab { position:fixed; bottom:24px; left:20px; right:20px; padding:16px; background:var(--accent); color:#fff; border:none; border-radius:var(--r); font-family:'Unbounded',sans-serif; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 8px 32px rgba(232,121,160,.35); transition:transform .15s; z-index:100; }
    .fab:active { transform:scale(.97); }
    .fab.v2 { background:var(--accent2); box-shadow:0 8px 32px rgba(124,106,247,.35); }

    /* modal */
    .mo { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity .25s; }
    .mo.open { opacity:1; pointer-events:all; }
    .md { width:100%; background:var(--bg2); border-radius:24px 24px 0 0; padding:24px 20px 40px; transform:translateY(100%); transition:transform .3s cubic-bezier(.16,1,.3,1); }
    .mo.open .md { transform:translateY(0); }
    .mh { width:40px; height:4px; background:var(--hint); border-radius:2px; margin:0 auto 20px; opacity:.4; }
    .mtitle { font-family:'Unbounded',sans-serif; font-size:15px; font-weight:600; margin-bottom:20px; }

    /* form */
    .field { margin-bottom:14px; }
    .field label { display:block; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--hint); font-family:'Unbounded',sans-serif; margin-bottom:7px; }
    .field input, .field select { width:100%; background:var(--bg); border:1.5px solid rgba(255,255,255,.08); border-radius:var(--rs); padding:13px 14px; color:var(--text); font-family:'Geologica',sans-serif; font-size:14px; outline:none; transition:border-color .2s; appearance:none; -webkit-appearance:none; }
    .field input:focus, .field select:focus { border-color:var(--accent); }
    .field select option { background:#222; }
    .tgrid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .tbtn { padding:10px 4px; text-align:center; background:var(--bg); border:1.5px solid rgba(255,255,255,.08); border-radius:var(--rs); font-size:11px; color:var(--hint); cursor:pointer; transition:all .2s; font-family:'Geologica',sans-serif; }
    .tbtn.active { border-color:var(--accent); color:var(--accent); background:rgba(232,121,160,.1); }
    .tbtn .ti { font-size:18px; display:block; margin-bottom:4px; }
    .submit { width:100%; padding:15px; background:var(--accent); color:#fff; border:none; border-radius:var(--rs); font-family:'Unbounded',sans-serif; font-size:13px; font-weight:600; cursor:pointer; margin-top:8px; transition:opacity .2s; }
    .submit:disabled { opacity:.5; cursor:default; }

    @keyframes up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>

<!-- SCREEN: MAIN -->
<div class="screen active" id="screen-main">
  <div class="header">
    <div class="avatar" id="av">?</div>
    <div class="htext">
      <h1 id="uname">Planner</h1>
      <div class="status"><div class="sdot" id="sdot"></div><span id="sstatus">Підключення...</span></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-t" onclick="switchTab('tasks')">Завдання</button>
    <button class="tab"        id="tab-g" onclick="switchTab('groups')">Групи</button>
  </div>
  <div class="filters" id="filters">
    <button class="fb active" onclick="setF('all',this)">Всі</button>
    <button class="fb" onclick="setF('specific_date',this)">📅 По даті</button>
    <button class="fb" onclick="setF('daily',this)">🔁 Щоденні</button>
    <button class="fb" onclick="setF('seasonal',this)">🌿 Сезонні</button>
    <button class="fb" onclick="setF('done',this)">✅ Виконані</button>
  </div>
  <div class="sec" id="sec-tasks">
    <div class="sec-lbl">Мої плани</div>
    <div class="lst" id="task-list"><div class="empty"><div class="ei">📋</div><p>Завдань поки немає</p></div></div>
  </div>
  <div class="sec" id="sec-groups" style="display:none">
    <div class="sec-lbl">Мої групи</div>
    <div class="lst" id="group-list"><div class="empty"><div class="ei">👥</div><p>Груп поки немає</p></div></div>
  </div>
  <button class="fab" id="mfab" onclick="openMainModal()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
    <span id="flbl">Нове завдання</span>
  </button>
</div>

<!-- SCREEN: GROUP DETAIL -->
<div class="screen" id="screen-group">
  <div class="back" onclick="goBack()">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M11 4L6 9l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Назад
  </div>
  <div class="gdh">
    <div class="gdtitle" id="gd-name">—</div>
    <div class="gdmeta"  id="gd-meta">—</div>
    <div class="gacts">
      <button class="abtn a-invite" onclick="shareGrp()">📤 Запросити</button>
      <button class="abtn a-delete" id="btn-del-grp" onclick="deleteGroup()" style="display:none">🗑 Видалити групу</button>
    </div>
  </div>
  <div class="sec" style="animation-delay:.15s">
    <div class="sec-lbl">Учасники</div>
    <div class="lst" id="member-list"><div class="empty"><div class="ei">👤</div><p>Учасників поки немає</p></div></div>
  </div>
  <div class="sec" style="animation-delay:.2s">
    <div class="sec-lbl">Завдання групи</div>
    <div class="lst" id="gtask-list"><div class="empty"><div class="ei">📋</div><p>Завдань поки немає</p></div></div>
  </div>
  <button class="fab v2" id="gfab" onclick="openGTaskModal()" style="display:none">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
    Нове завдання
  </button>
</div>

<!-- MODAL -->
<div class="mo" id="mo" onclick="outsideClose(event)">
  <div class="md">
    <div class="mh"></div>
    <div class="mtitle" id="mtitle">—</div>

    <!-- особисте завдання -->
    <div id="f-task">
      <div class="field"><label>Назва</label><input type="text" id="ti" placeholder="Наприклад: Купити продукти" maxlength="100"></div>
      <div class="field"><label>Тип</label>
        <div class="tgrid">
          <button class="tbtn active" onclick="selT('specific_date',this)"><span class="ti">📅</span>По даті</button>
          <button class="tbtn"        onclick="selT('daily',this)">        <span class="ti">🔁</span>Щодня</button>
          <button class="tbtn"        onclick="selT('seasonal',this)">     <span class="ti">🌿</span>Сезонне</button>
        </div>
      </div>
      <div class="field" id="df"  style="display:none"><label>Дата</label><input type="date" id="tdi"></div>
      <div class="field" id="sf"  style="display:none"><label>Сезон</label><select id="tsi"><option value="winter">❄️ Зима</option><option value="spring">🌸 Весна</option><option value="summer">☀️ Літо</option><option value="autumn">🍂 Осінь</option></select></div>
      <button class="submit" id="ts-btn" onclick="submitTask()">Додати завдання</button>
    </div>

    <!-- редагування завдання -->
    <div id="f-edit" style="display:none">
      <div class="field"><label>Назва</label><input type="text" id="ei" maxlength="100"></div>
      <div class="field" id="edf"><label>Дата</label><input type="date" id="edi"></div>
      <div class="field" id="esf" style="display:none"><label>Сезон</label><select id="esi"><option value="winter">❄️ Зима</option><option value="spring">🌸 Весна</option><option value="summer">☀️ Літо</option><option value="autumn">🍂 Осінь</option></select></div>
      <button class="submit" id="es-btn" onclick="submitEdit()">Зберегти зміни</button>
    </div>

    <!-- нова група -->
    <div id="f-group" style="display:none">
      <div class="field"><label>Назва групи</label><input type="text" id="gi2" placeholder="Наприклад: Сімейні справи" maxlength="60"></div>
      <button class="submit" id="gs-btn" onclick="submitGroup()">Створити групу</button>
    </div>

    <!-- групове завдання -->
    <div id="f-gtask" style="display:none">
      <div class="field"><label>Назва</label><input type="text" id="gti" placeholder="Завдання для групи" maxlength="100"></div>
      <div class="field"><label>Тип</label>
        <div class="tgrid">
          <button class="tbtn active" onclick="selGT('specific_date',this)"><span class="ti">📅</span>По даті</button>
          <button class="tbtn"        onclick="selGT('daily',this)">        <span class="ti">🔁</span>Щодня</button>
          <button class="tbtn"        onclick="selGT('seasonal',this)">     <span class="ti">🌿</span>Сезонне</button>
        </div>
      </div>
      <div class="field" id="gdf" style="display:none"><label>Дата</label><input type="date" id="gtdi"></div>
      <div class="field" id="gsf" style="display:none"><label>Сезон</label><select id="gtsi"><option value="winter">❄️ Зима</option><option value="spring">🌸 Весна</option><option value="summer">☀️ Літо</option><option value="autumn">🍂 Осінь</option></select></div>
      <button class="submit" id="gts-btn" onclick="submitGTask()">Додати завдання</button>
    </div>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand(); tg.enableClosingConfirmation();

// ── стан ──────────────────────────────────────────────────
let uid     = null;
let tab     = 'tasks';
let filter  = 'all';
let tasks   = [];
let groups  = [];
let sType   = 'specific_date';
let sGType  = 'specific_date';
let curGrp  = null;  // {id, name, isOwner}
let editId  = null;  // id завдання що редагується

// ── юзер ─────────────────────────────────────────────────
const tgu = tg.initDataUnsafe?.user;
if (tgu) {
  document.getElementById('uname').textContent = `Привіт, ${tgu.first_name}!`;
  const a = document.getElementById('av');
  if (tgu.photo_url) a.innerHTML = `<img src="${tgu.photo_url}" alt="">`;
  else a.textContent = tgu.first_name[0].toUpperCase();
}

// ── api ───────────────────────────────────────────────────
async function api(method, path, body) {
  const r = await fetch(path, {
    method,
    headers: { 'Content-Type':'application/json', ...(uid ? {'X-User-Id': String(uid)} : {}) },
    ...(body ? {body: JSON.stringify(body)} : {})
  });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.detail || `HTTP ${r.status}`); }
  return r.json();
}

// ── навігація ─────────────────────────────────────────────
function show(name) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById('screen-'+name).classList.add('active'); }
function goBack()   { curGrp=null; show('main'); }

// ── логін ─────────────────────────────────────────────────
async function init() {
  try {
    const d = await api('POST','/api/login',{initData: tg.initData});
    uid = d.user_id;
    document.getElementById('sdot').classList.add('ok');
    document.getElementById('sstatus').textContent = '✅ Авторизовано';
    await loadTasks(); await loadGroups();
    const gp = new URLSearchParams(window.location.search).get('group');
    if (gp) openGrp(parseInt(gp));
  } catch { document.getElementById('sstatus').textContent = '❌ Помилка входу'; }
}

// ── завдання ──────────────────────────────────────────────
async function loadTasks() { tasks = await api('GET','/api/tasks').catch(()=>[]); renderTasks(); }

function renderTasks() {
  const l = document.getElementById('task-list');
  let ts = [...tasks];
  if (filter==='done')       ts = ts.filter(t=>t.is_completed);
  else if (filter!=='all')   ts = ts.filter(t=>t.task_type===filter && !t.is_completed);
  else                       ts = ts.filter(t=>!t.is_completed);
  l.innerHTML = ts.length ? ts.map((t,i)=>tCard(t,i,false)).join('') : emp('📋','Тут поки порожньо');
}

async function toggleTask(id) {
  const t = tasks.find(t=>t.id===id); if (!t||t.is_completed) return;
  await api('PATCH',`/api/tasks/${id}/complete`).catch(e=>tg.showAlert(e.message));
  t.is_completed=true; tg.HapticFeedback.impactOccurred('light'); renderTasks();
}

async function submitTask() {
  const title = document.getElementById('ti').value.trim(); if (!title) return tg.showAlert('Введи назву');
  setBtnLoading('ts-btn','Зберігаємо...');
  try {
    await api('POST','/api/tasks',{title, task_type:sType,
      due_date: sType==='specific_date'?(document.getElementById('tdi').value||null):null,
      season:   sType==='seasonal'?document.getElementById('tsi').value:null});
    tg.HapticFeedback.notificationOccurred('success'); closeModal(); await loadTasks();
  } catch(e) { tg.showAlert(e.message); }
  finally { resetBtn('ts-btn','Додати завдання'); }
}

function openEditModal(t) {
  editId = t.id;
  document.getElementById('mtitle').textContent  = 'Редагувати завдання';
  show4('f-edit');
  document.getElementById('ei').value  = t.title;
  const isDate   = t.task_type === 'specific_date';
  const isSeason = t.task_type === 'seasonal';
  document.getElementById('edf').style.display  = isDate   ? '' : 'none';
  document.getElementById('esf').style.display  = isSeason ? '' : 'none';
  if (isDate && t.due_date)   document.getElementById('edi').value = t.due_date.split('T')[0];
  if (isSeason && t.season)   document.getElementById('esi').value = t.season;
  openModal(); setTimeout(()=>document.getElementById('ei').focus(),350);
}

async function submitEdit() {
  const title = document.getElementById('ei').value.trim(); if (!title) return tg.showAlert('Введи назву');
  setBtnLoading('es-btn','Зберігаємо...');
  try {
    const body = {title};
    const edf  = document.getElementById('edf');
    if (edf.style.display!=='none') body.due_date = document.getElementById('edi').value||null;
    const esf  = document.getElementById('esf');
    if (esf.style.display!=='none') body.season   = document.getElementById('esi').value;
    await api('PATCH',`/api/tasks/${editId}`,body);
    tg.HapticFeedback.notificationOccurred('success'); closeModal(); await loadTasks();
  } catch(e) { tg.showAlert(e.message); }
  finally { resetBtn('es-btn','Зберегти зміни'); }
}

async function deleteTask(id, inGroup) {
  tg.showPopup({title:'Видалити завдання',message:'Ти впевнений?',buttons:[{id:'y',type:'destructive',text:'Видалити'},{id:'n',type:'cancel'}]},async btn=>{
    if (btn!=='y') return;
    try {
      await api('DELETE',`/api/tasks/${id}`);
      tg.HapticFeedback.notificationOccurred('success');
      if (inGroup) await loadGTasks(curGrp.id);
      else await loadTasks();
    } catch(e) { tg.showAlert(e.message); }
  });
}

// ── групи ─────────────────────────────────────────────────
async function loadGroups() { groups = await api('GET','/api/groups').catch(()=>[]); renderGroups(); }

function renderGroups() {
  const l = document.getElementById('group-list');
  l.innerHTML = groups.length ? groups.map((g,i)=>`
    <div class="gc" style="animation-delay:${i*.04}s" onclick="openGrp(${g.id})">
      <div class="gi ${g.role==='owner'?'own':'mem'}">${g.role==='owner'?'👥':'👁'}</div>
      <div class="ginfo">
        <div class="gname">${esc(g.name)}</div>
        <div class="gmeta">${g.role==='owner'?'Власник':'Учасник'} • Натисни для перегляду</div>
      </div>
      <div class="garr">›</div>
    </div>`).join('') : emp('👥','Груп поки немає');
}

async function submitGroup() {
  const name = document.getElementById('gi2').value.trim(); if (!name) return tg.showAlert('Введи назву');
  setBtnLoading('gs-btn','Створюємо...');
  try {
    await api('POST','/api/groups',{name});
    tg.HapticFeedback.notificationOccurred('success'); closeModal(); await loadGroups();
  } catch(e) { tg.showAlert(e.message); }
  finally { resetBtn('gs-btn','Створити групу'); }
}

async function deleteGroup() {
  tg.showPopup({
    title:'Видалити групу',
    message:`Видалити групу «${curGrp.name}»? Всі завдання та учасники будуть видалені.`,
    buttons:[{id:'y',type:'destructive',text:'Видалити'},{id:'n',type:'cancel'}]
  }, async btn=>{
    if (btn!=='y') return;
    try {
      await api('DELETE',`/api/groups/${curGrp.id}`);
      tg.HapticFeedback.notificationOccurred('success');
      await loadGroups(); goBack();
    } catch(e) { tg.showAlert(e.message); }
  });
}

// ── група — детальний екран ────────────────────────────────
async function openGrp(gid) {
  try {
    const d = await api('GET',`/api/groups/${gid}/members`);
    const isOwner = groups.some(g=>g.id===gid && g.role==='owner');
    curGrp = {id:gid, name:d.name, isOwner};

    document.getElementById('gd-name').textContent = d.name;
    document.getElementById('gd-meta').textContent = `${d.members.length} учасн. • ${isOwner?'Ви власник':'Учасник'}`;
    document.getElementById('gfab').style.display      = isOwner ? 'flex' : 'none';
    document.getElementById('btn-del-grp').style.display = isOwner ? 'flex' : 'none';

    renderMembers(d.members);
    await loadGTasks(gid);
    show('group');
  } catch(e) { tg.showAlert('Помилка: '+e.message); }
}

function renderMembers(members) {
  const l = document.getElementById('member-list');
  l.innerHTML = members.length ? members.map((m,i)=>{
    const isO = m.role==='owner';
    const canR = curGrp?.isOwner && !isO;
    return `<div class="mc" style="animation-delay:${i*.04}s">
      <div class="mav">${m.first_name[0].toUpperCase()}</div>
      <div class="mi"><div class="mn">${esc(m.first_name)}</div><div class="mu">${m.username?'@'+esc(m.username):'без username'}</div></div>
      <span class="mrole ${isO?'ro':'rm'}">${isO?'👑 Власник':'Учасник'}</span>
      ${canR?`<button class="rem-btn" onclick="removeMember(${m.user_id},'${esc(m.first_name)}')"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>`:''}
    </div>`;
  }).join('') : emp('👤','Учасників поки немає');
}

async function removeMember(mid, name) {
  tg.showPopup({title:'Видалити учасника',message:`Видалити ${name} з групи?`,buttons:[{id:'y',type:'destructive',text:'Видалити'},{id:'n',type:'cancel'}]},async btn=>{
    if (btn!=='y') return;
    try { await api('DELETE',`/api/groups/${curGrp.id}/members/${mid}`); tg.HapticFeedback.notificationOccurred('success'); await openGrp(curGrp.id); }
    catch(e) { tg.showAlert(e.message); }
  });
}

async function loadGTasks(gid) {
  const ts = await api('GET',`/api/groups/${gid}/tasks`).catch(()=>[]);
  document.getElementById('gtask-list').innerHTML = ts.length ? ts.map((t,i)=>tCard(t,i,true)).join('') : emp('📋','Завдань поки немає');
}

async function toggleGTask(id) {
  await api('PATCH',`/api/tasks/${id}/complete`).catch(e=>tg.showAlert(e.message));
  tg.HapticFeedback.impactOccurred('light'); await loadGTasks(curGrp.id);
}

async function submitGTask() {
  const title = document.getElementById('gti').value.trim(); if (!title) return tg.showAlert('Введи назву');
  setBtnLoading('gts-btn','Зберігаємо...');
  try {
    await api('POST',`/api/groups/${curGrp.id}/tasks`,{title,task_type:sGType,
      due_date: sGType==='specific_date'?(document.getElementById('gtdi').value||null):null,
      season:   sGType==='seasonal'?document.getElementById('gtsi').value:null});
    tg.HapticFeedback.notificationOccurred('success'); closeModal(); await loadGTasks(curGrp.id);
  } catch(e) { tg.showAlert(e.message); }
  finally { resetBtn('gts-btn','Додати завдання'); }
}

// ── share ─────────────────────────────────────────────────
function shareGrp() {
  if (!curGrp) return;
  const bot  = 'your_bot_username'; // ← заміни!
  const link = `https://t.me/${bot}?start=group_${curGrp.id}`;
  tg.showPopup({title:curGrp.name,message:'Поділись посиланням щоб додати учасника:',buttons:[{id:'s',type:'default',text:'📤 Поділитись'},{id:'c',type:'default',text:'📋 Скопіювати'},{id:'x',type:'destructive',text:'Закрити'}]},(b)=>{
    if (b==='s') tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(`Приєднуйся до групи "${curGrp.name}"`)}`);
    if (b==='c') navigator.clipboard.writeText(link).then(()=>tg.showAlert('✅ Скопійовано!'));
  });
}

// ── UI helpers ────────────────────────────────────────────
function switchTab(t) {
  tab = t;
  document.getElementById('tab-t').classList.toggle('active', t==='tasks');
  document.getElementById('tab-g').classList.toggle('active', t==='groups');
  document.getElementById('sec-tasks').style.display  = t==='tasks'  ? '' : 'none';
  document.getElementById('sec-groups').style.display = t==='groups' ? '' : 'none';
  document.getElementById('filters').style.display    = t==='tasks'  ? 'flex' : 'none';
  const f = document.getElementById('mfab'), l = document.getElementById('flbl');
  if (t==='groups') { f.classList.add('v2');    l.textContent='Нова група'; }
  else              { f.classList.remove('v2'); l.textContent='Нове завдання'; }
}
function setF(f, el) { filter=f; document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active')); el.classList.add('active'); renderTasks(); }

function openMainModal() {
  const g = tab==='groups';
  document.getElementById('mtitle').textContent = g?'Нова група':'Нове завдання';
  show4(g?'f-group':'f-task');
  if (!g) { document.getElementById('ti').value=''; selT('specific_date',document.querySelector('#f-task .tbtn')); }
  else    { document.getElementById('gi2').value=''; }
  openModal();
  setTimeout(()=>(g?document.getElementById('gi2'):document.getElementById('ti')).focus(),350);
}
function openGTaskModal() {
  document.getElementById('mtitle').textContent='Нове завдання групи';
  show4('f-gtask'); document.getElementById('gti').value='';
  selGT('specific_date',document.querySelector('#f-gtask .tbtn'));
  openModal(); setTimeout(()=>document.getElementById('gti').focus(),350);
}
function show4(id) { ['f-task','f-edit','f-group','f-gtask'].forEach(i=>document.getElementById(i).style.display=i===id?'':'none'); }
function openModal()  { document.getElementById('mo').classList.add('open'); tg.HapticFeedback.impactOccurred('medium'); }
function closeModal() { document.getElementById('mo').classList.remove('open'); }
function outsideClose(e) { if (e.target===document.getElementById('mo')) closeModal(); }

function selT(t, el) {
  sType=t; document.querySelectorAll('#f-task .tbtn').forEach(b=>b.classList.remove('active')); el.classList.add('active');
  document.getElementById('df').style.display = t==='specific_date'?'':'none';
  document.getElementById('sf').style.display = t==='seasonal'?'':'none';
}
function selGT(t, el) {
  sGType=t; document.querySelectorAll('#f-gtask .tbtn').forEach(b=>b.classList.remove('active')); el.classList.add('active');
  document.getElementById('gdf').style.display = t==='specific_date'?'':'none';
  document.getElementById('gsf').style.display = t==='seasonal'?'':'none';
}

function setBtnLoading(id, txt) { const b=document.getElementById(id); b.disabled=true; b.textContent=txt; }
function resetBtn(id, txt)      { const b=document.getElementById(id); b.disabled=false; b.textContent=txt; }

// ── рендер картки завдання ────────────────────────────────
function tCard(t, i, isG) {
  const badge = {daily:`<span class="badge bd">🔁 Щодня</span>`,specific_date:`<span class="badge bdate">📅 По даті</span>`,seasonal:`<span class="badge bs">🌿 Сезон</span>`}[t.task_type]||'';
  const meta  = t.due_date ? new Date(t.due_date).toLocaleDateString('uk-UA',{day:'numeric',month:'short'}) : (t.season||'');
  const canEdit   = isG ? curGrp?.isOwner : true;
  const canDelete = isG ? curGrp?.isOwner : true;
  const toggle    = isG ? `toggleGTask(${t.id})` : `toggleTask(${t.id})`;
  const editFn    = isG ? '' : `openEditModal(${JSON.stringify(t).replace(/"/g,'&quot;')})`;
  const delFn     = `deleteTask(${t.id},${isG})`;

  return `<div class="tc ${t.is_completed?'done':''}" style="animation-delay:${i*.04}s">
    <div class="chk" onclick="${toggle}">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="tb" onclick="${toggle}">
      <div class="tt">${esc(t.title)}</div>
      <div class="tm">${badge}${meta?`<span>${meta}</span>`:''}</div>
    </div>
    ${!t.is_completed ? `<div class="ta">
      ${canEdit && !isG ? `<button class="icon-btn edit" onclick="event.stopPropagation();${editFn}"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9.5 2.5l2 2L4 12H2v-2L9.5 2.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>` : ''}
      ${canDelete ? `<button class="icon-btn del" onclick="event.stopPropagation();${delFn}"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2.5h4V4M5.5 6.5v4M8.5 6.5v4M3 4l.8 7.5h6.4L11 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>` : ''}
    </div>` : ''}
  </div>`;
}

function emp(icon, txt) { return `<div class="empty"><div class="ei">${icon}</div><p>${txt}</p></div>`; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// enter
[['ti',submitTask],['gi2',submitGroup],['gti',submitGTask],['ei',submitEdit]].forEach(([id,fn])=>{
  document.getElementById(id).addEventListener('keydown', e=>{ if(e.key==='Enter') fn(); });
});

init();
</script>
</body>
</html>
