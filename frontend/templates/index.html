<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Planner</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0d;
  --bg2:#111111;
  --bg3:#181818;
  --line:#1e1e1e;
  --tx:#f0ebe3;
  --tx2:#888880;
  --tx3:#444440;
  --gold:#c8a97e;
  --teal:#4dbfa0;
  --purple:#a98ae8;
  --r:20px;
  --rs:12px;
  --nav:58px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);font-weight:300}

/* ── SCREENS ─────────────────────────────────── */
.screen{position:fixed;inset:0;bottom:var(--nav);overflow-y:auto;overflow-x:hidden;display:none;-webkit-overflow-scrolling:touch}
.screen.active{display:block}
.screen::-webkit-scrollbar{display:none}

/* ── NAV ─────────────────────────────────────── */
.nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:var(--bg2);border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-around;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.ni{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 16px;border-radius:12px;transition:background .15s}
.ni:active{background:var(--bg3)}
.ni svg{width:20px;height:20px}
.ni span{font-size:9px;color:var(--tx3);letter-spacing:.05em;transition:color .2s}
.ni.on span{color:var(--gold)}

/* ── HOME ────────────────────────────────────── */
.h-wrap{min-height:100%;display:flex;flex-direction:column}

/* top bar */
.h-bar{padding:22px 20px 0;display:flex;justify-content:space-between;align-items:flex-start}
.h-date{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);margin-bottom:10px}
.h-hero{font-family:'Playfair Display',serif;font-size:30px;line-height:1.05;color:var(--tx)}
.h-hero em{color:var(--gold);font-style:italic}
.h-sub{font-size:10px;color:var(--tx3);margin-top:5px;letter-spacing:.03em}
.h-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#a07850);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:#1a1005;flex-shrink:0}

/* divider */
.h-div{height:1px;background:var(--line);margin:18px 20px}

/* horizontal scroll — today cards */
.h-scroll-lbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);padding:0 20px;margin-bottom:10px}
.h-scroll{display:flex;gap:10px;padding:0 20px;overflow-x:auto;scrollbar-width:none;margin-bottom:20px}
.h-scroll::-webkit-scrollbar{display:none}
.h-card{flex-shrink:0;width:148px;background:var(--bg2);border-radius:18px;padding:16px;border:1px solid var(--line);position:relative;cursor:pointer;transition:border-color .2s}
.h-card:active{border-color:#2e2e2e}
.h-card-acc{width:28px;height:3px;border-radius:2px;margin-bottom:12px}
.h-card-t{font-size:13px;color:var(--tx);line-height:1.4;font-weight:400}
.h-card-m{font-size:10px;color:var(--tx3);margin-top:6px}
.h-card.done{opacity:.35}
.h-card.done .h-card-t{text-decoration:line-through;color:var(--tx3)}

/* numbered list — upcoming */
.h-list{padding:0 20px;flex:1}
.h-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);cursor:pointer}
.h-item:last-child{border-bottom:none}
.h-num{font-family:'Playfair Display',serif;font-size:20px;color:var(--line);line-height:1;flex-shrink:0;width:28px;margin-top:-1px;transition:color .2s}
.h-item:hover .h-num{color:var(--tx3)}
.h-item-body{flex:1;min-width:0}
.h-item-t{font-size:13px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-item-m{font-size:10px;color:var(--tx3);margin-top:3px}
.h-item-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}

/* fab */
.fab{position:fixed;bottom:calc(var(--nav) + 16px);right:20px;width:48px;height:48px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:50;transition:transform .15s;box-shadow:0 4px 20px #c8a97e30}
.fab:active{transform:scale(.93)}

/* ── GROUPS ──────────────────────────────────── */
.g-wrap{min-height:100%;padding-bottom:20px}
.g-top{padding:22px 20px 16px}
.g-title{font-family:'Playfair Display',serif;font-style:italic;font-size:26px;color:var(--tx)}
.g-sub{font-size:10px;color:var(--tx3);margin-top:3px}
.g-card{margin:0 16px 8px;background:var(--bg2);border-radius:18px;padding:16px;border:1px solid var(--line);display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .2s}
.g-card:active{border-color:#2e2e2e}
.g-ic{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--bg);flex-shrink:0}
.g-info{flex:1;min-width:0}
.g-name{font-size:14px;color:var(--tx);font-weight:400}
.g-meta{font-size:10px;color:var(--tx3);margin-top:3px}
.g-role{font-size:9px;padding:2px 8px;border-radius:100px;font-weight:500;letter-spacing:.03em}
.role-owner{background:#c8a97e20;color:var(--gold)}
.role-member{background:#ffffff08;color:var(--tx3)}
.g-arr{color:var(--tx3);font-size:18px;margin-left:4px}
.g-new{margin:8px 16px 0;background:transparent;border-radius:16px;padding:13px 16px;border:1px dashed var(--line);display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .2s}
.g-new:active{border-color:#2e2e2e}
.g-new-t{font-size:12px;color:var(--tx3)}

/* GROUP DETAIL */
.gd-wrap{min-height:100%;padding-bottom:80px}
.gd-back{display:flex;align-items:center;gap:8px;padding:20px 20px 0;font-size:13px;color:var(--gold);cursor:pointer}
.gd-header{padding:14px 20px 16px;border-bottom:1px solid var(--line)}
.gd-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--tx)}
.gd-meta{font-size:10px;color:var(--tx3);margin-top:4px}
.gd-acts{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.gd-btn{padding:9px 14px;border-radius:var(--rs);font-size:11px;font-family:'DM Sans',sans-serif;font-weight:400;cursor:pointer;border:1px solid var(--line);background:transparent;display:flex;align-items:center;gap:6px;color:var(--tx3);transition:all .2s;letter-spacing:.02em}
.gd-btn.inv{border-color:#c8a97e40;color:var(--gold)}
.gd-btn.del{border-color:#e8505030;color:#e85050}
.gd-sec{padding:18px 20px 0}
.gd-slbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);margin-bottom:12px}
.m-card{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
.m-card:last-child{border-bottom:none}
.m-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#a07850);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#1a1005;flex-shrink:0}
.m-av.teal{background:linear-gradient(135deg,var(--teal),#2a9070)}
.m-av.purple{background:linear-gradient(135deg,var(--purple),#7060b0)}
.m-info{flex:1}
.m-name{font-size:13px;color:var(--tx)}
.m-un{font-size:10px;color:var(--tx3);margin-top:2px}
.m-remove{width:28px;height:28px;border-radius:50%;background:#e8505015;color:#e85050;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* task in group */
.gt-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);cursor:pointer}
.gt-item:last-child{border-bottom:none}
.gt-chk{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--tx3);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.gt-chk.ok{background:var(--teal);border-color:var(--teal)}
.gt-body{flex:1;min-width:0}
.gt-t{font-size:13px;color:var(--tx)}
.gt-m{font-size:10px;color:var(--tx3);margin-top:3px}
.gt-acts{display:flex;gap:4px}
.gt-ibtn{width:28px;height:28px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx3);transition:background .15s}
.gt-ibtn:active{background:var(--bg3)}
.gt-ibtn.del{color:#e85050}

/* ── CALENDAR ────────────────────────────────── */
.cal-wrap{min-height:100%;padding-bottom:20px}
.cal-top{padding:22px 20px 14px;display:flex;justify-content:space-between;align-items:baseline}
.cal-month{font-family:'Playfair Display',serif;font-size:26px;color:var(--tx)}
.cal-yr{font-size:11px;color:var(--tx3)}
.cal-nav{display:flex;gap:16px;align-items:center}
.cal-arr{width:28px;height:28px;border-radius:50%;background:var(--bg2);border:1px solid var(--line);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx3);transition:background .15s}
.cal-arr:active{background:var(--bg3)}
.cal-grid{padding:0 16px;margin-bottom:12px}
.cal-dnames{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cal-dn{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--tx3);text-align:center;padding:4px 0}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-d{height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;cursor:pointer;border-radius:10px;transition:background .15s}
.cal-d:active{background:var(--bg3)}
.cal-d span{font-size:12px;color:var(--tx3);line-height:1}
.cal-d.cur span{color:var(--tx)}
.cal-d.other span{color:var(--tx3);opacity:.3}
.cal-d.today{background:var(--bg3)}
.cal-d.today span{color:var(--tx)}
.cal-d.sel{background:var(--gold)!important}
.cal-d.sel span{color:#1a1005!important;font-weight:500}
.cal-d .dot{width:3px;height:3px;border-radius:50%;background:var(--gold);position:absolute;bottom:4px}
.cal-d.sel .dot{background:#1a1005}
.cal-events{margin:0 16px;background:var(--bg2);border-radius:18px;padding:16px;border:1px solid var(--line)}
.cal-ev-date{font-family:'Playfair Display',serif;font-size:14px;color:var(--gold);margin-bottom:12px}
.cal-ev-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
.cal-ev-item:last-child{border-bottom:none}
.cal-ev-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.cal-ev-t{font-size:12px;color:var(--tx);flex:1}
.cal-ev-m{font-size:10px;color:var(--tx3)}
.cal-empty{text-align:center;padding:24px 0;font-size:12px;color:var(--tx3);font-style:italic}

/* ── SETTINGS ────────────────────────────────── */
.set-wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.set-icon{width:64px;height:64px;border-radius:50%;background:var(--bg2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.set-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--tx);text-align:center;margin-bottom:8px}
.set-sub{font-size:13px;color:var(--tx3);text-align:center;line-height:1.6;max-width:240px}

/* ── MODAL ───────────────────────────────────── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.mo.open{opacity:1;pointer-events:all}
.md{width:100%;background:var(--bg2);border-radius:24px 24px 0 0;padding:24px 20px 40px;transform:translateY(100%);transition:transform .35s cubic-bezier(.16,1,.3,1);border-top:1px solid var(--line)}
.mo.open .md{transform:translateY(0)}
.mh{width:36px;height:3px;background:var(--tx3);border-radius:2px;margin:0 auto 22px;opacity:.3}
.mtit{font-family:'Playfair Display',serif;font-size:20px;color:var(--tx);margin-bottom:20px}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.fld input,.fld select{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:var(--rs);padding:13px 14px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.fld input:focus,.fld select:focus{border-color:var(--gold)}
.fld input::placeholder{color:var(--tx3)}
.fld select option{background:#111}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.tbtn{padding:10px 6px;text-align:center;background:var(--bg);border:1px solid var(--line);border-radius:var(--rs);font-size:11px;color:var(--tx3);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.tbtn .ti{font-size:16px;display:block;margin-bottom:3px}
.tbtn.active{border-color:var(--gold);color:var(--gold);background:#c8a97e10}
.submit{width:100%;padding:15px;background:var(--gold);color:#1a1005;border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;margin-top:10px;transition:opacity .2s;letter-spacing:.02em}
.submit:disabled{opacity:.45;cursor:default}

/* ── ANIMATIONS ──────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.anim{opacity:0;animation:fadeUp .4s both}
</style>
</head>
<body>

<!-- ══ HOME ══════════════════════════════════════ -->
<div class="screen active" id="screen-home">
<div class="h-wrap">
  <div class="h-bar">
    <div>
      <div class="h-date" id="h-date">—</div>
      <div class="h-hero" id="h-hero">Завантаження...</div>
      <div class="h-sub" id="h-sub"></div>
    </div>
    <div class="h-av" id="h-av">?</div>
  </div>

  <div class="h-div"></div>

  <!-- горизонтальний скрол — сьогодні -->
  <div class="h-scroll-lbl">На сьогодні</div>
  <div class="h-scroll" id="today-scroll">
    <!-- JS -->
  </div>

  <!-- нумерований список — заплановані -->
  <div class="h-list" id="upcoming-list">
    <!-- JS -->
  </div>
</div>
</div>

<!-- ══ GROUPS LIST ════════════════════════════════ -->
<div class="screen" id="screen-groups">
<div class="g-wrap">
  <div class="g-top">
    <div class="g-title">Мої групи</div>
    <div class="g-sub" id="g-sub">—</div>
  </div>
  <div id="group-list"></div>
  <div class="g-new" onclick="openGroupModal()">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="#444" stroke-width="1.5" stroke-linecap="round"/></svg>
    <div class="g-new-t">Створити новий простір</div>
  </div>
</div>
</div>

<!-- ══ GROUP DETAIL ═══════════════════════════════ -->
<div class="screen" id="screen-gdetail">
<div class="gd-wrap">
  <div class="gd-back" onclick="backToGroups()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 4L6 8l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Назад
  </div>
  <div class="gd-header">
    <div class="gd-title" id="gd-title">—</div>
    <div class="gd-meta"  id="gd-meta">—</div>
    <div class="gd-acts">
      <button class="gd-btn inv" onclick="shareGrp()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2l2 2-2 2M10 4H5a3 3 0 000 6h1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Запросити
      </button>
      <button class="gd-btn del" id="gd-del-btn" onclick="deleteGroup()" style="display:none">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1.5 3h9M4 3V2h4v1M5 5.5v3M7 5.5v3M2 3l.75 7h6.5L10 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Видалити групу
      </button>
    </div>
  </div>
  <div class="gd-sec">
    <div class="gd-slbl">Учасники</div>
    <div id="member-list"></div>
  </div>
  <div class="gd-sec" style="margin-top:20px">
    <div class="gd-slbl">Завдання групи</div>
    <div id="gtask-list"></div>
  </div>
</div>
<button class="fab" id="gd-fab" onclick="openGTaskModal()" style="display:none">
  <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3v12M3 9h12" stroke="#1a1005" stroke-width="2" stroke-linecap="round"/></svg>
</button>
</div>

<!-- ══ CALENDAR ═══════════════════════════════════ -->
<div class="screen" id="screen-cal">
<div class="cal-wrap">
  <div class="cal-top">
    <div class="cal-month" id="cal-month">—</div>
    <div class="cal-nav">
      <div class="cal-arr" onclick="calMove(-1)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="cal-yr" id="cal-yr">—</div>
      <div class="cal-arr" onclick="calMove(1)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
  </div>
  <div class="cal-grid">
    <div class="cal-dnames">
      <div class="cal-dn">пн</div><div class="cal-dn">вт</div><div class="cal-dn">ср</div>
      <div class="cal-dn">чт</div><div class="cal-dn">пт</div><div class="cal-dn">сб</div><div class="cal-dn">нд</div>
    </div>
    <div class="cal-days" id="cal-days"></div>
  </div>
  <div class="cal-events" id="cal-events"></div>
</div>
</div>

<!-- ══ SETTINGS ═══════════════════════════════════ -->
<div class="screen" id="screen-settings">
<div class="set-wrap">
  <div class="set-icon">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <path d="M14 3a2 2 0 00-2 2v1.1A8 8 0 006.1 12H5a2 2 0 000 4h1.1A8 8 0 0012 21.9V23a2 2 0 004 0v-1.1A8 8 0 0021.9 16H23a2 2 0 000-4h-1.1A8 8 0 0016 6.1V5a2 2 0 00-2-2z" stroke="#444" stroke-width="1.5"/>
      <circle cx="14" cy="14" r="3" stroke="#444" stroke-width="1.5"/>
    </svg>
  </div>
  <div class="set-title">Налаштування</div>
  <div class="set-sub">Наразі тут немає жодного функціоналу.<br>Ми над цим працюємо ✦</div>
</div>
</div>

<!-- ══ NAVIGATION ════════════════════════════════ -->
<nav class="nav">
  <div class="ni on" id="nav-home" onclick="goTo('home')">
    <svg viewBox="0 0 20 20" fill="none">
      <path d="M3 8.5L10 3l7 5.5V17a1 1 0 01-1 1H4a1 1 0 01-1-1V8.5z" stroke="currentColor" stroke-width="1.4"/>
      <path d="M7 18v-6h6v6" stroke="currentColor" stroke-width="1.4"/>
    </svg>
    <span>Головна</span>
  </div>
  <div class="ni" id="nav-groups" onclick="goTo('groups')">
    <svg viewBox="0 0 20 20" fill="none">
      <circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.4"/>
      <path d="M2 17c0-3 2.7-5 6-5s6 2 6 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <circle cx="15" cy="7" r="2" stroke="currentColor" stroke-width="1.4"/>
      <path d="M17 16c0-2-1.3-3.5-3-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    <span>Групи</span>
  </div>
  <div class="ni" id="nav-cal" onclick="goTo('cal')">
    <svg viewBox="0 0 20 20" fill="none">
      <rect x="3" y="5" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.4"/>
      <path d="M7 3v4M13 3v4M3 10h14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    <span>Календар</span>
  </div>
  <div class="ni" id="nav-settings" onclick="goTo('settings')">
    <svg viewBox="0 0 20 20" fill="none">
      <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.4"/>
      <path d="M10 3v1.5M10 15.5V17M3 10h1.5M15.5 10H17M5.1 5.1l1.1 1.1M13.8 13.8l1.1 1.1M5.1 14.9l1.1-1.1M13.8 6.2l1.1-1.1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    <span>Налашт.</span>
  </div>
</nav>

<!-- ══ MODAL ══════════════════════════════════════ -->
<div class="mo" id="mo" onclick="outClose(event)">
<div class="md">
  <div class="mh"></div>
  <div class="mtit" id="mtit">—</div>

  <!-- task form -->
  <div id="f-task">
    <div class="fld"><label>Назва завдання</label><input type="text" id="ti" placeholder="Що потрібно зробити?" maxlength="100"></div>
    <div class="fld"><label>Тип</label>
      <div class="tgrid">
        <button class="tbtn active" onclick="selT('specific_date',this)"><span class="ti">📅</span>По даті</button>
        <button class="tbtn"        onclick="selT('daily',this)">        <span class="ti">🔁</span>Щодня</button>
        <button class="tbtn"        onclick="selT('seasonal',this)">     <span class="ti">🌿</span>Сезонне</button>
      </div>
    </div>
    <div class="fld" id="df" style="display:none"><label>Дата</label><input type="date" id="tdi"></div>

  <div id="f-edit" style="display:none">

    <div class="fld" id="edf" style="display:none"><label>Дата</label><input type="date" id="edi"></div>
    <div class="fld" id="esf" style="display:none"><label>Сезон</label>
      <select id="esi"><option value="winter">❄️ Зима</option><option value="spring">🌸 Весна</option><option value="summer">☀️ Літо</option><option value="autumn">🍂 Осінь</option></select>
    </div>
    <button class="submit" id="es-btn" onclick="submitEdit()">Зберегти</button>
  </div>

  <!-- group form -->
  <div id="f-group" style="display:none">
    <div class="fld"><label>Назва групи</label><input type="text" id="gi" placeholder="Наприклад: Сімейні справи" maxlength="60"></div>
    <button class="submit" id="gs-btn" onclick="submitGroup()">Створити групу</button>
  </div>

  <!-- group task form -->
  <div id="f-gtask" style="display:none">
    <div class="fld"><label>Назва завдання</label><input type="text" id="gti" placeholder="Завдання для групи" maxlength="100"></div>
    <div class="fld"><label>Тип</label>
      <div class="tgrid">
        <button class="tbtn active" onclick="selGT('specific_date',this)"><span class="ti">📅</span>По даті</button>
        <button class="tbtn"        onclick="selGT('daily',this)">        <span class="ti">🔁</span>Щодня</button>
        <button class="tbtn"        onclick="selGT('seasonal',this)">     <span class="ti">🌿</span>Сезонне</button>
      </div>
    </div>
    <div class="fld" id="gdf" style="display:none"><label>Дата</label><input type="date" id="gtdi"></div>
    <div class="fld" id="gsf" style="display:none"><label>Сезон</label>
      <select id="gtsi"><option value="winter">❄️ Зима</option><option value="spring">🌸 Весна</option><option value="summer">☀️ Літо</option><option value="autumn">🍂 Осінь</option></select>

<!-- FAB (home) -->
<button class="fab" id="home-fab" onclick="openTaskModal()">
  <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3v12M3 9h12" stroke="#1a1005" stroke-width="2" stroke-linecap="round"/></svg>
</button>

<script>
const tg = window.Telegram.WebApp;
tg.expand(); tg.enableClosingConfirmation();

// ── STATE ─────────────────────────────────────────────────
let uid=null, tasks=[], groups=[], curGrp=null, editId=null, sT='specific_date', sGT='specific_date';
const COLORS=['#c8a97e','#4dbfa0','#a98ae8','#e8a050','#e87878'];
const BOT='your_planner_bot';

// ── API ───────────────────────────────────────────────────
async function api(m,p,b){
  const r=await fetch(p,{method:m,headers:{'Content-Type':'application/json',...(uid?{'X-User-Id':String(uid)}:{})}, ...(b?{body:JSON.stringify(b)}:{})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||`HTTP ${r.status}`);}
  return r.json();
}

// ── NAVIGATION ────────────────────────────────────────────
const SCREENS=['home','groups','cal','settings'];
function goTo(name){
  SCREENS.forEach(s=>{
    document.getElementById('screen-'+s).classList.toggle('active',s===name);
    document.getElementById('nav-'+s)?.classList.toggle('on',s===name);
  });
  document.getElementById('home-fab').style.display = name==='home'?'flex':'none';
  // scroll to top
  document.getElementById('screen-'+name).scrollTop=0;
  tg.HapticFeedback.selectionChanged();
}

function showGDetail(){
  SCREENS.forEach(s=>document.getElementById('screen-'+s).classList.remove('active'));
  document.getElementById('screen-gdetail').classList.add('active');
  document.getElementById('home-fab').style.display='none';
}
function backToGroups(){
  document.getElementById('screen-gdetail').classList.remove('active');
  document.getElementById('screen-groups').classList.add('active');
  document.getElementById('nav-groups').classList.add('on');
  document.getElementById('nav-home').classList.remove('on');
}

// ── USER ──────────────────────────────────────────────────
const tgu=tg.initDataUnsafe?.user;
function setupUser(){
  const av=document.getElementById('h-av');
  if(tgu){
    if(tgu.photo_url) av.innerHTML=`<img src="${tgu.photo_url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
    else av.textContent=tgu.first_name[0].toUpperCase();
  }
}

// ── DATE ──────────────────────────────────────────────────
function setupDate(){
  const now=new Date();
  const days=['неділя','понеділок','вівторок','середа','четвер','п'ятниця','субота'];
  const months=['січня','лютого','березня','квітня','травня','червня','липня','серпня','вересня','жовтня','листопада','грудня'];
  document.getElementById('h-date').textContent=`${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;
}

// ── LOGIN ─────────────────────────────────────────────────
async function init(){
  setupUser(); setupDate();
  try{
    const d=await api('POST','/api/login',{initData:tg.initData});
    uid=d.user_id;
    await Promise.all([loadTasks(),loadGroups()]);
    const gp=new URLSearchParams(window.location.search).get('group');
    if(gp) openGrp(parseInt(gp));
  } catch(e){
    // fallback — показуємо порожній стан
    renderHome();
  }
}

// ── TASKS ─────────────────────────────────────────────────
async function loadTasks(){tasks=await api('GET','/api/tasks').catch(()=>[]);renderHome();}

function renderHome(){
  const now=new Date(); now.setHours(0,0,0,0);
  const todayTasks=tasks.filter(t=>{
    if(t.task_type==='daily') return true;
    if(t.task_type==='specific_date'&&t.due_date){
      const d=new Date(t.due_date); d.setHours(0,0,0,0);
      return d.getTime()===now.getTime();
    }
    return false;
  });
  const upcoming=tasks.filter(t=>{
    if(t.task_type==='seasonal') return !t.is_completed;
    if(t.task_type==='specific_date'&&t.due_date){
      const d=new Date(t.due_date); d.setHours(0,0,0,0);
      return d.getTime()>now.getTime() && !t.is_completed;
    }
    return false;
  });

  const done=todayTasks.filter(t=>t.is_completed).length;
  const total=todayTasks.length;
  const name=tgu?tgu.first_name:'';
  const hour=new Date().getHours();
  const gr=hour<12?'Добрий ранок':'hour<17'?'Добрий день':'Добрий вечір';
  const greet=hour<12?'Добрий ранок':'Добрий вечір';

  document.getElementById('h-hero').innerHTML=
    total>0
      ? `<em>${total}</em> ${plural(total,'справа','справи','справ')}<br>на сьогодні`
      : `${name?`<em>${name}</em><br>`:''}Вільний день ✦`;
  document.getElementById('h-sub').textContent=total>0?(done>0?`${done} виконано · ${total-done} очікують`:'Усе попереду'):'Немає завдань на сьогодні';

  // scroll cards
  const scroll=document.getElementById('today-scroll');
  if(!todayTasks.length){
    scroll.innerHTML=`<div style="font-size:12px;color:var(--tx3);padding:4px 0;font-style:italic">Сьогодні завдань немає</div>`;
  } else {
    scroll.innerHTML=todayTasks.map((t,i)=>{
      const col=COLORS[i%COLORS.length];
      return `<div class="h-card${t.is_completed?' done':''} anim" style="animation-delay:${i*.06}s" onclick="toggleTask(${t.id})">
        <div class="h-card-acc" style="background:${t.is_completed?'#333':col}"></div>
        <div class="h-card-t">${esc(t.title)}</div>
        <div class="h-card-m">${t.task_type==='daily'?'🔁 Щодня':formatDate(t.due_date)}</div>
      </div>`;
    }).join('');
  }

  // numbered upcoming
  const ul=document.getElementById('upcoming-list');
  if(!upcoming.length){
    ul.innerHTML=`<div style="padding:20px 0;font-size:12px;color:var(--tx3);font-style:italic">Немає запланованих завдань</div>`;
  } else {
    ul.innerHTML=upcoming.slice(0,8).map((t,i)=>{
      const col=COLORS[i%COLORS.length];
      return `<div class="h-item anim" style="animation-delay:${(i+todayTasks.length)*.06}s">
        <div class="h-num">${String(i+1).padStart(2,'0')}</div>
        <div class="h-item-body">
          <div class="h-item-t">${esc(t.title)}</div>
          <div class="h-item-m">${t.task_type==='seasonal'?`🌿 ${seasonName(t.season)}`:t.task_type==='daily'?'🔁 Щодня':formatDate(t.due_date)}</div>
        </div>
        <div class="h-item-dot" style="background:${col}"></div>
      </div>`;
    }).join('');
  }
}

async function toggleTask(id){
  const t=tasks.find(t=>t.id===id); if(!t||t.is_completed) return;
  await api('PATCH',`/api/tasks/${id}/complete`).catch(e=>tg.showAlert(e.message));
  t.is_completed=true; tg.HapticFeedback.impactOccurred('light'); renderHome();
}

async function delTask(id,inG){
  tg.showPopup({title:'Видалити завдання',message:'Впевнений?',buttons:[{id:'y',type:'destructive',text:'Видалити'},{id:'n',type:'cancel'}]},async b=>{
    if(b!=='y') return;
    await api('DELETE',`/api/tasks/${id}`).catch(e=>tg.showAlert(e.message));
    tg.HapticFeedback.notificationOccurred('success');
    if(inG) await loadGTasks(curGrp.id); else await loadTasks();
  });
}

function openEdit(t){
  editId=t.id; show4('f-edit');
  document.getElementById('mtit').textContent='Редагувати';
  document.getElementById('ei').value=t.title;
  document.getElementById('edf').style.display=t.task_type==='specific_date'?'':'none';
  document.getElementById('esf').style.display=t.task_type==='seasonal'?'':'none';
  if(t.due_date) document.getElementById('edi').value=t.due_date.split('T')[0];
  if(t.season)   document.getElementById('esi').value=t.season;
  openModal(); setTimeout(()=>document.getElementById('ei').focus(),350);
}

async function submitEdit(){
  const title=document.getElementById('ei').value.trim(); if(!title) return tg.showAlert('Введи назву');
  bl('es-btn','Зберігаємо...');
  try{
    const body={title};
    if(document.getElementById('edf').style.display!=='none') body.due_date=document.getElementById('edi').value||null;
    if(document.getElementById('esf').style.display!=='none') body.season=document.getElementById('esi').value;
    await api('PATCH',`/api/tasks/${editId}`,body);
    tg.HapticFeedback.notificationOccurred('success'); closeModal(); await loadTasks();
  } catch(e){tg.showAlert(e.message);}
  finally{rb('es-btn','Зберегти');}
}

async function submitTask(){
  const title=document.getElementById('ti').value.trim(); if(!title) return tg.showAlert('Введи назву');
  bl('ts-btn','Додаємо...');
  try{
    await api('POST','/api/tasks',{title,task_type:sT,
      due_date:sT==='specific_date'?(document.getElementById('tdi').value||null):null,
      season:sT==='seasonal'?document.getElementById('tsi').value:null});
    tg.HapticFeedback.notificationOccurred('success'); closeModal(); await loadTasks();
  } catch(e){tg.showAlert(e.message);}
  finally{rb('ts-btn','Додати завдання');}
}

// ── GROUPS ────────────────────────────────────────────────
async function loadGroups(){groups=await api('GET','/api/groups').catch(()=>[]);renderGroups();}

function renderGroups(){
  const l=document.getElementById('group-list');
  document.getElementById('g-sub').textContent=groups.length?`${groups.length} ${plural(groups.length,'простір','простори','просторів')}`:'Ще немає груп';
  if(!groups.length){l.innerHTML=`<div style="padding:20px;font-size:12px;color:var(--tx3);text-align:center;font-style:italic">Створи свій перший простір</div>`;return;}
  l.innerHTML=groups.map((g,i)=>{
    const col=COLORS[i%COLORS.length];
    return `<div class="g-card anim" style="animation-delay:${i*.06}s" onclick="openGrp(${g.id})">
      <div class="g-ic" style="background:${col}">${g.name[0].toUpperCase()}</div>
      <div class="g-info">
        <div class="g-name">${esc(g.name)}</div>
        <div class="g-meta"><span class="g-role ${g.role==='owner'?'role-owner':'role-member'}">${g.role==='owner'?'власник':'учасник'}</span></div>
      </div>
      <div class="g-arr">›</div>
    </div>`;
  }).join('');
}

async function submitGroup(){
  const name=document.getElementById('gi').value.trim(); if(!name) return tg.showAlert('Введи назву');
  bl('gs-btn','Створюємо...');
  try{
    await api('POST','/api/groups',{name});
    tg.HapticFeedback.notificationOccurred('success'); closeModal(); await loadGroups();
  } catch(e){tg.showAlert(e.message);}
  finally{rb('gs-btn','Створити групу');}
}

async function deleteGroup(){
  tg.showPopup({title:'Видалити групу',message:`Видалити «${curGrp.name}»? Всі дані будуть втрачені.`,buttons:[{id:'y',type:'destructive',text:'Видалити'},{id:'n',type:'cancel'}]},async b=>{
    if(b!=='y') return;
    await api('DELETE',`/api/groups/${curGrp.id}`).catch(e=>tg.showAlert(e.message));
    tg.HapticFeedback.notificationOccurred('success');
    await loadGroups(); backToGroups();
  });
}

async function openGrp(gid){
  try{
    const d=await api('GET',`/api/groups/${gid}/members`);
    const isOwner=groups.some(g=>g.id===gid&&g.role==='owner');
    curGrp={id:gid,name:d.name,isOwner};
    document.getElementById('gd-title').textContent=d.name;
    document.getElementById('gd-meta').textContent=`${d.members.length} учасн. · ${isOwner?'Ви власник':'Учасник'}`;
    document.getElementById('gd-del-btn').style.display=isOwner?'flex':'none';
    document.getElementById('gd-fab').style.display='flex';
    renderMembers(d.members);
    await loadGTasks(gid);
    showGDetail();
  } catch(e){tg.showAlert('Помилка: '+e.message);}
}

function renderMembers(members){
  const avatarColors=['','teal','purple','','teal'];
  const l=document.getElementById('member-list');
  l.innerHTML=members.length?members.map((m,i)=>{
    const isO=m.role==='owner', canR=curGrp?.isOwner&&!isO;
    const cls=avatarColors[i%avatarColors.length];
    return `<div class="m-card">
      <div class="m-av ${cls}">${m.first_name[0].toUpperCase()}</div>
      <div class="m-info">
        <div class="m-name">${esc(m.first_name)}</div>
        <div class="m-un">${m.username?'@'+esc(m.username):'без username'} · ${isO?'👑 власник':'учасник'}</div>
      </div>
      ${canR?`<button class="m-remove" onclick="removeMember(${m.user_id},'${esc(m.first_name)}')">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>`:''}
    </div>`;
  }).join(''):`<div style="padding:12px 0;font-size:12px;color:var(--tx3);font-style:italic">Учасників поки немає</div>`;
}

async function removeMember(mid,name){
  tg.showPopup({title:'Видалити учасника',message:`Видалити ${name} з групи?`,buttons:[{id:'y',type:'destructive',text:'Видалити'},{id:'n',type:'cancel'}]},async b=>{
    if(b!=='y') return;
    await api('DELETE',`/api/groups/${curGrp.id}/members/${mid}`).catch(e=>tg.showAlert(e.message));
    tg.HapticFeedback.notificationOccurred('success'); await openGrp(curGrp.id);
  });
}

async function loadGTasks(gid){
  const ts=await api('GET',`/api/groups/${gid}/tasks`).catch(()=>[]);
  const l=document.getElementById('gtask-list');
  if(!ts.length){l.innerHTML=`<div style="padding:12px 0;font-size:12px;color:var(--tx3);font-style:italic">Завдань поки немає</div>`;return;}
  l.innerHTML=ts.map((t,i)=>{
    const isAuthor=t.created_by===uid;
    const isOwner=curGrp?.isOwner;
    const canEdit=!t.is_completed&&isAuthor;
    const canDel=isOwner;
    return `<div class="gt-item">
      <div class="gt-chk${t.is_completed?' ok':''}" onclick="toggleGTask(${t.id})">
        ${t.is_completed?`<svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1.5 4.5l2 2 4-4" stroke="#0d0d0d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
      </div>
      <div class="gt-body">
        <div class="gt-t" style="${t.is_completed?'text-decoration:line-through;color:var(--tx3)':''}">${esc(t.title)}</div>
        <div class="gt-m">${t.task_type==='daily'?'🔁 Щодня':t.task_type==='seasonal'?`🌿 ${seasonName(t.season)}`:formatDate(t.due_date)}</div>
      </div>
      <div class="gt-acts">
        ${canEdit?`<button class="gt-ibtn" onclick="openEdit(${JSON.stringify(t).replace(/"/g,'&quot;')})">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2l2 2-6 6H2V8l6-6z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>`:''}
        ${canDel?`<button class="gt-ibtn del" onclick="delTask(${t.id},true)">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1.5 3h9M4 3V2h4v1M5 5v4M7 5v4M2 3l.7 7h6.6L10 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>`:''}
      </div>
    </div>`;
  }).join('');
}

async function toggleGTask(id){
  await api('PATCH',`/api/tasks/${id}/complete`).catch(e=>tg.showAlert(e.message));
  tg.HapticFeedback.impactOccurred('light'); await loadGTasks(curGrp.id);
}

async function submitGTask(){
  const title=document.getElementById('gti').value.trim(); if(!title) return tg.showAlert('Введи назву');
  bl('gts-btn','Додаємо...');
  try{
    await api('POST',`/api/groups/${curGrp.id}/tasks`,{title,task_type:sGT,
      due_date:sGT==='specific_date'?(document.getElementById('gtdi').value||null):null,
      season:sGT==='seasonal'?document.getElementById('gtsi').value:null});
    tg.HapticFeedback.notificationOccurred('success'); closeModal(); await loadGTasks(curGrp.id);
  } catch(e){tg.showAlert(e.message);}
  finally{rb('gts-btn','Додати завдання');}
}

function shareGrp(){
  if(!curGrp) return;
  const link=`https://t.me/${BOT}?start=group_${curGrp.id}`;
  tg.showPopup({title:curGrp.name,message:'Поділись посиланням:',buttons:[{id:'s',type:'default',text:'📤 Поділитись'},{id:'c',type:'default',text:'📋 Скопіювати'},{id:'x',type:'destructive',text:'Закрити'}]},(b)=>{
    if(b==='s') tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(`Приєднуйся до «${curGrp.name}»`)}`);
    if(b==='c') navigator.clipboard.writeText(link).then(()=>tg.showAlert('✅ Скопійовано!'));
  });
}

// ── CALENDAR ──────────────────────────────────────────────
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth(), calSel=new Date();

const MONTHS_UK=['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];

function renderCal(){
  document.getElementById('cal-month').textContent=MONTHS_UK[calMonth];
  document.getElementById('cal-yr').textContent=calYear;

  const first=new Date(calYear,calMonth,1);
  let startDow=first.getDay(); if(startDow===0) startDow=7; // пн=1
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();
  const today=new Date(); today.setHours(0,0,0,0);

  // Які дати мають завдання
  const hasDates=new Set();
  tasks.forEach(t=>{
    if(t.due_date){
      const d=new Date(t.due_date);
      if(d.getFullYear()===calYear&&d.getMonth()===calMonth) hasDates.add(d.getDate());
    }
  });

  let html='';
  // попередній місяць
  for(let i=startDow-2;i>=0;i--){
    html+=`<div class="cal-d other"><span>${prevDays-i}</span></div>`;
  }
  // поточний
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(calYear,calMonth,d); dt.setHours(0,0,0,0);
    const isToday=dt.getTime()===today.getTime();
    const isSel=dt.getTime()===calSel.getTime();
    const hasT=hasDates.has(d);
    html+=`<div class="cal-d cur${isToday?' today':''}${isSel?' sel':''}" onclick="calSelect(${d})">
      <span>${d}</span>
      ${hasT?`<div class="dot"></div>`:''}
    </div>`;
  }
  // наступний
  const total=startDow-1+daysInMonth;
  const rem=(7-total%7)%7;
  for(let d=1;d<=rem;d++) html+=`<div class="cal-d other"><span>${d}</span></div>`;

  document.getElementById('cal-days').innerHTML=html;
  renderCalEvents();
}

function calSelect(d){
  calSel=new Date(calYear,calMonth,d);
  tg.HapticFeedback.selectionChanged();
  renderCal();
}
function calMove(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCal();
}

function renderCalEvents(){
  const ev=document.getElementById('cal-events');
  const selDay=calSel.getDate(), selM=calSel.getMonth(), selY=calSel.getFullYear();
  const dayTasks=tasks.filter(t=>{
    if(t.task_type==='daily') return true;
    if(t.due_date){
      const d=new Date(t.due_date);
      return d.getDate()===selDay&&d.getMonth()===selM&&d.getFullYear()===selY;
    }
    return false;
  });

  const months_uk=['січня','лютого','березня','квітня','травня','червня','липня','серпня','вересня','жовтня','листопада','грудня'];
  ev.innerHTML=`<div class="cal-ev-date">${selDay} ${months_uk[selM]}</div>`;
  if(!dayTasks.length){
    ev.innerHTML+=`<div class="cal-empty">Завдань немає ✦</div>`;
  } else {
    ev.innerHTML+=dayTasks.map((t,i)=>`
      <div class="cal-ev-item">
        <div class="cal-ev-dot" style="background:${COLORS[i%COLORS.length]}"></div>
        <div class="cal-ev-t" style="${t.is_completed?'text-decoration:line-through;color:var(--tx3)':''}">${esc(t.title)}</div>
        <div class="cal-ev-m">${t.task_type==='daily'?'🔁':''}</div>
      </div>`).join('');
  }
}

// ── MODAL ─────────────────────────────────────────────────
function openTaskModal(){
  document.getElementById('mtit').textContent='Нове завдання';
  show4('f-task'); document.getElementById('ti').value='';
  selT('specific_date',document.querySelector('#f-task .tbtn'));
  openModal(); setTimeout(()=>document.getElementById('ti').focus(),350);
}
function openGroupModal(){
  document.getElementById('mtit').textContent='Новий простір';
  show4('f-group'); document.getElementById('gi').value='';
  openModal(); setTimeout(()=>document.getElementById('gi').focus(),350);
}
function openGTaskModal(){
  document.getElementById('mtit').textContent='Завдання для групи';
  show4('f-gtask'); document.getElementById('gti').value='';
  selGT('specific_date',document.querySelector('#f-gtask .tbtn'));
  openModal(); setTimeout(()=>document.getElementById('gti').focus(),350);
}

function show4(id){['f-task','f-edit','f-group','f-gtask'].forEach(i=>document.getElementById(i).style.display=i===id?'':'none');}
function openModal(){document.getElementById('mo').classList.add('open');tg.HapticFeedback.impactOccurred('medium');}
function closeModal(){document.getElementById('mo').classList.remove('open');}
function outClose(e){if(e.target===document.getElementById('mo'))closeModal();}

function selT(t,el){sT=t;document.querySelectorAll('#f-task .tbtn').forEach(b=>b.classList.remove('active'));el.classList.add('active');document.getElementById('df').style.display=t==='specific_date'?'':'none';document.getElementById('sf').style.display=t==='seasonal'?'':'none';}
function selGT(t,el){sGT=t;document.querySelectorAll('#f-gtask .tbtn').forEach(b=>b.classList.remove('active'));el.classList.add('active');document.getElementById('gdf').style.display=t==='specific_date'?'':'none';document.getElementById('gsf').style.display=t==='seasonal'?'':'none';}

function bl(id,t){const b=document.getElementById(id);b.disabled=true;b.textContent=t;}
function rb(id,t){const b=document.getElementById(id);b.disabled=false;b.textContent=t;}

// ── UTILS ─────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function plural(n,a,b,c){const m=n%100,m2=n%10;if(m>=11&&m<=19)return c;if(m2===1)return a;if(m2>=2&&m2<=4)return b;return c;}
function formatDate(s){if(!s)return '';const d=new Date(s);return d.toLocaleDateString('uk-UA',{day:'numeric',month:'short'});}
function seasonName(s){return {winter:'Зима',spring:'Весна',summer:'Літо',autumn:'Осінь'}[s]||s;}

// Enter handlers
[['ti',submitTask],['gi',submitGroup],['gti',submitGTask],['ei',submitEdit]].forEach(([id,fn])=>{
  document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')fn();});
});

// ── INIT ──────────────────────────────────────────────────
// Calendar init
(()=>{renderCal();})();

// Nav observer — render calendar when first opened
document.getElementById('nav-cal').addEventListener('click',()=>{renderCal();});

init();
</script>
