<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Planner</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Geologica:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:  var(--tg-theme-bg-color, #0f0f0f);
      --bg2: var(--tg-theme-secondary-bg-color, #1a1a1a);
      --tx:  var(--tg-theme-text-color, #f0f0f0);
      --ht:  var(--tg-theme-hint-color, #888);
      --ac:  #e879a0;
      --ac2: #7c6af7;
      --ok:  #4ade80;
      --err: #f87171;
      --wn:  #fbbf24;
      --r:   18px;
      --rs:  12px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:'Geologica',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding-bottom:110px;font-weight:300;overflow-x:hidden}
    .screen{display:none}.screen.active{display:block}

    /* header */
    .hdr{padding:20px 20px 0;display:flex;align-items:center;gap:14px;opacity:0;animation:up .5s .1s forwards}
    .av{width:48px;height:48px;border-radius:50%;overflow:hidden;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;color:#fff;flex-shrink:0}
    .av img{width:100%;height:100%;object-fit:cover}
    .ht h1{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:600}
    .ht .st{font-size:12px;color:var(--ht);display:flex;align-items:center;gap:4px;margin-top:2px}
    .sd{width:6px;height:6px;border-radius:50%;background:var(--ht);transition:background .3s}
    .sd.ok{background:var(--ok)}

    /* back */
    .back{display:flex;align-items:center;gap:8px;padding:20px 20px 0;font-size:14px;color:var(--ac);cursor:pointer;width:fit-content;opacity:0;animation:up .3s .05s forwards}

    /* tabs + swipe wrapper */
    .tabs{display:flex;gap:8px;padding:20px 20px 0;opacity:0;animation:up .5s .2s forwards}
    .tab{flex:1;padding:10px 0;text-align:center;font-family:'Unbounded',sans-serif;font-size:11px;border-radius:var(--rs);background:var(--bg2);color:var(--ht);cursor:pointer;transition:all .25s;border:none;outline:none}
    .tab.active{background:var(--ac);color:#fff}

    /* swipe container — два контент-блоки поруч */
    .swipe-wrap{overflow:hidden;width:100%}
    .swipe-track{display:flex;transition:transform .3s cubic-bezier(.25,.8,.25,1);will-change:transform}
    .swipe-pane{flex:0 0 100%;width:100%;min-width:0}

    /* filters */
    .fltrs{display:flex;gap:8px;padding:14px 20px 0;overflow-x:auto;scrollbar-width:none;opacity:0;animation:up .5s .3s forwards}
    .fltrs::-webkit-scrollbar{display:none}
    .fb{flex-shrink:0;padding:7px 14px;border-radius:100px;font-size:12px;background:var(--bg2);color:var(--ht);cursor:pointer;transition:all .2s;border:none;font-family:'Geologica',sans-serif}
    .fb.active{background:var(--ac);color:#fff}

    /* section */
    .sec{margin:16px 20px 0;opacity:0;animation:up .5s .35s forwards}
    .slbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ht);font-family:'Unbounded',sans-serif;margin-bottom:10px}

    /* list */
    .lst{display:flex;flex-direction:column;gap:8px}

    /* task card */
    .tc{background:var(--bg2);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:10px;animation:up .3s both;position:relative;overflow:hidden}
    .tc.done{opacity:.5}
    .tc.done .tt{text-decoration:line-through}
    .chk{width:24px;height:24px;border-radius:50%;border:2px solid var(--ht);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer}
    .tc.done .chk{background:var(--ok);border-color:var(--ok)}
    .chk svg{display:none}
    .tc.done .chk svg{display:block}
    .tb{flex:1;min-width:0;cursor:pointer}
    .tt{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tm{font-size:11px;color:var(--ht);margin-top:3px;display:flex;align-items:center;gap:6px}
    .bdg{font-size:10px;padding:2px 7px;border-radius:100px;font-weight:500}
    .bd{background:rgba(124,106,247,.2);color:var(--ac2)}
    .bdt{background:rgba(232,121,160,.2);color:var(--ac)}
    .bs{background:rgba(251,191,36,.15);color:var(--wn)}
    .tact{display:flex;gap:4px;flex-shrink:0}
    .ibtn{width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:transparent;transition:background .15s}
    .ibtn.ed{color:var(--ht)}.ibtn.ed:active{background:rgba(255,255,255,.08)}
    .ibtn.dl{color:var(--err)}.ibtn.dl:active{background:rgba(248,113,113,.12)}

    /* group card */
    .gc{background:var(--bg2);border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:transform .15s;animation:up .3s both}
    .gc:active{transform:scale(.98)}
    .gi{width:44px;height:44px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
    .gi.own{background:linear-gradient(135deg,var(--ac2),var(--ac))}
    .gi.mem{background:linear-gradient(135deg,#333,#555)}
    .ginfo{flex:1;min-width:0}
    .gnm{font-size:14px;font-weight:500}
    .gmt{font-size:12px;color:var(--ht);margin-top:2px}
    .garr{color:var(--ht);font-size:20px}

    /* group detail header */
    .gdh{margin:16px 20px 0;padding:20px;background:var(--bg2);border-radius:var(--r);opacity:0;animation:up .4s .1s forwards}
    .gdtit{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:600}
    .gdmt{font-size:12px;color:var(--ht);margin-top:6px}
    .gacts{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
    .abtn{padding:10px 14px;border-radius:var(--rs);font-size:12px;font-family:'Unbounded',sans-serif;cursor:pointer;transition:all .2s;border:none;display:flex;align-items:center;gap:6px}
    .a-inv{background:rgba(232,121,160,.15);color:var(--ac)}
    .a-del{background:rgba(248,113,113,.12);color:var(--err)}

    /* member card */
    .mc{background:var(--bg2);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px;animation:up .3s both}
    .mav{width:38px;height:38px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--ac2),var(--ac));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#fff;font-family:'Unbounded',sans-serif}
    .mi{flex:1;min-width:0}
    .mn{font-size:14px}
    .mu{font-size:12px;color:var(--ht);margin-top:2px}
    .mrl{font-size:10px;padding:3px 8px;border-radius:100px;white-space:nowrap}
    .ro{background:rgba(251,191,36,.15);color:var(--wn)}
    .rm{background:rgba(255,255,255,.08);color:var(--ht)}
    .rbtn{width:30px;height:30px;border-radius:50%;background:rgba(248,113,113,.12);color:var(--err);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .rbtn:active{background:rgba(248,113,113,.25)}

    /* empty */
    .emp{text-align:center;padding:48px 20px;color:var(--ht)}
    .ei{font-size:40px;margin-bottom:12px}
    .emp p{font-size:14px;line-height:1.5}

    /* fab */
    .fab{position:fixed;bottom:24px;left:20px;right:20px;padding:16px;background:var(--ac);color:#fff;border:none;border-radius:var(--r);font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 8px 32px rgba(232,121,160,.35);transition:transform .15s;z-index:100}
    .fab:active{transform:scale(.97)}
    .fab.v2{background:var(--ac2);box-shadow:0 8px 32px rgba(124,106,247,.35)}

    /* modal */
    .mo{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
    .mo.open{opacity:1;pointer-events:all}
    .md{width:100%;background:var(--bg2);border-radius:24px 24px 0 0;padding:24px 20px 40px;transform:translateY(100%);transition:transform .3s cubic-bezier(.16,1,.3,1)}
    .mo.open .md{transform:translateY(0)}
    .mh{width:40px;height:4px;background:var(--ht);border-radius:2px;margin:0 auto 20px;opacity:.4}
    .mtit{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600;margin-bottom:20px}

    /* form */
    .fld{margin-bottom:14px}
    .fld label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ht);font-family:'Unbounded',sans-serif;margin-bottom:7px}
    .fld input,.fld select{width:100%;background:var(--bg);border:1.5px solid rgba(255,255,255,.08);border-radius:var(--rs);padding:13px 14px;color:var(--tx);font-family:'Geologica',sans-serif;font-size:14px;outline:none;transition:border-color .2s; appearance:none; -webkit-appearance:none}
    .fld input:focus,.fld select:focus{border-color:var(--ac)}
    .fld select option{background:#222}
    .tgr{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .tbtn{padding:10px 4px;text-align:center;background:var(--bg);border:1.5px solid rgba(255,255,255,.08);border-radius:var(--rs);font-size:11px;color:var(--ht);cursor:pointer;transition:all .2s;font-family:'Geologica',sans-serif}
    .tbtn.active{border-color:var(--ac);color:var(--ac);background:rgba(232,121,160,.1)}
    .tbtn .ti{font-size:18px;display:block;margin-bottom:4px}
    .sub{width:100%;padding:15px;background:var(--ac);color:#fff;border:none;border-radius:var(--rs);font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .2s}
    .sub:disabled{opacity:.5;cursor:default}

    @keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>

<!-- SCREEN: MAIN -->
<div class="screen active" id="screen-main">
  <div class="hdr">
    <div class="av" id="av">?</div>
    <div class="ht">
      <h1 id="uname">Planner</h1>
      <div class="st"><div class="sd" id="sd"></div><span id="ss">Підключення...</span></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-t"  onclick="switchTab(0)">Завдання</button>
    <button class="tab"        id="tab-g"  onclick="switchTab(1)">Групи</button>
  </div>

  <!-- свайп -->
  <div class="swipe-wrap" id="swipe-wrap">
    <div class="swipe-track" id="swipe-track">

      <!-- pane 0: завдання -->
      <div class="swipe-pane">
        <div class="fltrs">
          <button class="fb active" onclick="setF('all',this)">Всі</button>
          <button class="fb" onclick="setF('specific_date',this)">📅 По даті</button>
          <button class="fb" onclick="setF('daily',this)">🔁 Щоденні</button>
          <button class="fb" onclick="setF('seasonal',this)">🌿 Сезонні</button>
          <button class="fb" onclick="setF('done',this)">✅ Виконані</button>
        </div>
        <div class="sec">
          <div class="slbl">Мої плани</div>
          <div class="lst" id="task-list"><div class="emp"><div class="ei">📋</div><p>Завдань поки немає</p></div></div>
        </div>
      </div>

      <!-- pane 1: групи -->
      <div class="swipe-pane">
        <div class="sec">
          <div class="slbl">Мої групи</div>
          <div class="lst" id="group-list"><div class="emp"><div class="ei">👥</div><p>Груп поки немає</p></div></div>
        </div>
      </div>

    </div>
  </div>

  <button class="fab" id="mfab" onclick="openMainModal()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
    <span id="flbl">Нове завдання</span>
  </button>
</div>

<!-- SCREEN: GROUP DETAIL -->
<div class="screen" id="screen-group">
  <div class="back" onclick="goBack()">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M11 4L6 9l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Назад
  </div>
  <div class="gdh">
    <div class="gdtit" id="gd-name">—</div>
    <div class="gdmt"  id="gd-meta">—</div>
    <div class="gacts">
      <button class="abtn a-inv" onclick="shareGrp()">📤 Запросити</button>
      <button class="abtn a-del" id="bdg" onclick="deleteGroup()" style="display:none">🗑 Видалити групу</button>
    </div>
  </div>
  <div class="sec" style="animation-delay:.15s">
    <div class="slbl">Учасники</div>
    <div class="lst" id="member-list"><div class="emp"><div class="ei">👤</div><p>Учасників поки немає</p></div></div>
  </div>
  <div class="sec" style="animation-delay:.2s">
    <div class="slbl">Завдання групи</div>
    <div class="lst" id="gtask-list"><div class="emp"><div class="ei">📋</div><p>Завдань поки немає</p></div></div>
  </div>
  <button class="fab v2" id="gfab" onclick="openGTaskModal()" style="display:none">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
    Нове завдання
  </button>
</div>

<!-- MODAL -->
<div class="mo" id="mo" onclick="outClose(event)">
  <div class="md">
    <div class="mh"></div>
    <div class="mtit" id="mtit">—</div>

    <div id="f-task">
      <div class="fld"><label>Назва</label><input type="text" id="ti" placeholder="Наприклад: Купити продукти" maxlength="100"></div>
      <div class="fld"><label>Тип</label>
        <div class="tgr">
          <button class="tbtn active" onclick="selT('specific_date',this)"><span class="ti">📅</span>По даті</button>
          <button class="tbtn"        onclick="selT('daily',this)">        <span class="ti">🔁</span>Щодня</button>
          <button class="tbtn"        onclick="selT('seasonal',this)">     <span class="ti">🌿</span>Сезонне</button>
        </div>
      </div>
      <div class="fld" id="df"  style="display:none"><label>Дата</label><input type="date" id="tdi"></div>
      <div class="fld" id="sf"  style="display:none"><label>Сезон</label><select id="tsi"><option value="winter">❄️ Зима</option><option value="spring">🌸 Весна</option><option value="summer">☀️ Літо</option><option value="autumn">🍂 Осінь</option></select></div>
      <button class="sub" id="ts-btn" onclick="submitTask()">Додати завдання</button>
    </div>

    <div id="f-edit" style="display:none">
      <div class="fld"><label>Назва</label><input type="text" id="ei" maxlength="100"></div>
      <div class="fld" id="edf" style="display:none"><label>Дата</label><input type="date" id="edi"></div>
      <div class="fld" id="esf" style="display:none"><label>Сезон</label><select id="esi"><option value="winter">❄️ Зима</option><option value="spring">🌸 Весна</option><option value="summer">☀️ Літо</option><option value="autumn">🍂 Осінь</option></select></div>
      <button class="sub" id="es-btn" onclick="submitEdit()">Зберегти зміни</button>
    </div>

    <div id="f-group" style="display:none">
      <div class="fld"><label>Назва групи</label><input type="text" id="gi2" placeholder="Наприклад: Сімейні справи" maxlength="60"></div>
      <button class="sub" id="gs-btn" onclick="submitGroup()">Створити групу</button>
    </div>

    <div id="f-gtask" style="display:none">
      <div class="fld"><label>Назва</label><input type="text" id="gti" placeholder="Завдання для групи" maxlength="100"></div>
      <div class="fld"><label>Тип</label>
        <div class="tgr">
          <button class="tbtn active" onclick="selGT('specific_date',this)"><span class="ti">📅</span>По даті</button>
          <button class="tbtn"        onclick="selGT('daily',this)">        <span class="ti">🔁</span>Щодня</button>
          <button class="tbtn"        onclick="selGT('seasonal',this)">     <span class="ti">🌿</span>Сезонне</button>
        </div>
      </div>
      <div class="fld" id="gdf" style="display:none"><label>Дата</label><input type="date" id="gtdi"></div>
      <div class="fld" id="gsf" style="display:none"><label>Сезон</label><select id="gtsi"><option value="winter">❄️ Зима</option><option value="spring">🌸 Весна</option><option value="summer">☀️ Літо</option><option value="autumn">🍂 Осінь</option></select></div>
      <button class="sub" id="gts-btn" onclick="submitGTask()">Додати завдання</button>
    </div>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand(); tg.enableClosingConfirmation();

let uid=null, tabIdx=0, filter='all', tasks=[], groups=[], sT='specific_date', sGT='specific_date', curGrp=null, editId=null;

// ── юзер ─────────────────────────────────────────────────
const tgu = tg.initDataUnsafe?.user;
if (tgu) {
  document.getElementById('uname').textContent = `Привіт, ${tgu.first_name}!`;
  const a = document.getElementById('av');
  if (tgu.photo_url) a.innerHTML = `<img src="${tgu.photo_url}" alt="">`;
  else a.textContent = tgu.first_name[0].toUpperCase();
}

// ── api ───────────────────────────────────────────────────
async function api(m, p, b) {
  const r = await fetch(p, {
    method: m,
    headers: {'Content-Type':'application/json', ...(uid?{'X-User-Id':String(uid)}:{})},
    ...(b?{body:JSON.stringify(b)}:{})
  });
  if (!r.ok) { const e=await r.json().catch(()=>({})); throw new Error(e.detail||`HTTP ${r.status}`); }
  return r.json();
}

// ── свайп між табами ──────────────────────────────────────
const track = document.getElementById('swipe-track');
let swipeStartX=0, swipeStartY=0, swiping=false;

document.getElementById('swipe-wrap').addEventListener('touchstart', e=>{
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
  swiping = false;
}, {passive:true});

document.getElementById('swipe-wrap').addEventListener('touchmove', e=>{
  const dx = e.touches[0].clientX - swipeStartX;
  const dy = e.touches[0].clientY - swipeStartY;
  if (!swiping && Math.abs(dy) > Math.abs(dx)) return; // вертикальний скрол
  swiping = true;
  e.preventDefault();
}, {passive:false});

document.getElementById('swipe-wrap').addEventListener('touchend', e=>{
  if (!swiping) return;
  const dx = e.changedTouches[0].clientX - swipeStartX;
  if (Math.abs(dx) > 50) {
    if (dx < 0 && tabIdx === 0) switchTab(1);
    if (dx > 0 && tabIdx === 1) switchTab(0);
  }
}, {passive:true});

function switchTab(idx) {
  tabIdx = idx;
  track.style.transform = `translateX(-${idx * 100}%)`;
  document.getElementById('tab-t').classList.toggle('active', idx===0);
  document.getElementById('tab-g').classList.toggle('active', idx===1);
  const fab=document.getElementById('mfab'), lbl=document.getElementById('flbl');
  if (idx===1) { fab.classList.add('v2');    lbl.textContent='Нова група'; }
  else         { fab.classList.remove('v2'); lbl.textContent='Нове завдання'; }
}

// ── навігація між екранами ────────────────────────────────
function showScreen(n) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById('screen-'+n).classList.add('active'); }
function goBack() { curGrp=null; showScreen('main'); }

// ── логін ─────────────────────────────────────────────────
async function init() {
  try {
    const d = await api('POST','/api/login',{initData:tg.initData});
    uid = d.user_id;
    document.getElementById('sd').classList.add('ok');
    document.getElementById('ss').textContent = '✅ Авторизовано';
    await loadTasks(); await loadGroups();
    const gp = new URLSearchParams(window.location.search).get('group');
    if (gp) openGrp(parseInt(gp));
  } catch { document.getElementById('ss').textContent = '❌ Помилка входу'; }
}

// ── завдання ──────────────────────────────────────────────
async function loadTasks() { tasks = await api('GET','/api/tasks').catch(()=>[]); renderTasks(); }

function renderTasks() {
  const l = document.getElementById('task-list');
  let ts = [...tasks];
  if (filter==='done')     ts=ts.filter(t=>t.is_completed);
  else if (filter!=='all') ts=ts.filter(t=>t.task_type===filter && !t.is_completed);
  else                     ts=ts.filter(t=>!t.is_completed);
  l.innerHTML = ts.length ? ts.map((t,i)=>tCard(t,i,false)).join('') : emp('📋','Тут поки порожньо');
}

async function toggleTask(id) {
  const t=tasks.find(t=>t.id===id); if(!t||t.is_completed) return;
  await api('PATCH',`/api/tasks/${id}/complete`).catch(e=>tg.showAlert(e.message));
  t.is_completed=true; tg.HapticFeedback.impactOccurred('light'); renderTasks();
}

async function submitTask() {
  const title=document.getElementById('ti').value.trim(); if(!title) return tg.showAlert('Введи назву');
  bl('ts-btn','Зберігаємо...');
  try {
    await api('POST','/api/tasks',{title,task_type:sT,
      due_date:sT==='specific_date'?(document.getElementById('tdi').value||null):null,
      season:sT==='seasonal'?document.getElementById('tsi').value:null});
    tg.HapticFeedback.notificationOccurred('success'); closeModal(); await loadTasks();
  } catch(e){tg.showAlert(e.message);}
  finally{rb('ts-btn','Додати завдання');}
}

function openEdit(t) {
  editId=t.id;
  document.getElementById('mtit').textContent='Редагувати завдання';
  show4('f-edit');
  document.getElementById('ei').value=t.title;
  document.getElementById('edf').style.display = t.task_type==='specific_date'?'':'none';
  document.getElementById('esf').style.display = t.task_type==='seasonal'?'':'none';
  if(t.due_date) document.getElementById('edi').value=t.due_date.split('T')[0];
  if(t.season)   document.getElementById('esi').value=t.season;
  openModal(); setTimeout(()=>document.getElementById('ei').focus(),350);
}

async function submitEdit() {
  const title=document.getElementById('ei').value.trim(); if(!title) return tg.showAlert('Введи назву');
  bl('es-btn','Зберігаємо...');
  try {
    const body={title};
    if(document.getElementById('edf').style.display!=='none') body.due_date=document.getElementById('edi').value||null;
    if(document.getElementById('esf').style.display!=='none') body.season=document.getElementById('esi').value;
    await api('PATCH',`/api/tasks/${editId}`,body);
    tg.HapticFeedback.notificationOccurred('success'); closeModal(); await loadTasks();
  } catch(e){tg.showAlert(e.message);}
  finally{rb('es-btn','Зберегти зміни');}
}

async function delTask(id, inG) {
  tg.showPopup({title:'Видалити завдання',message:'Ти впевнений?',buttons:[{id:'y',type:'destructive',text:'Видалити'},{id:'n',type:'cancel'}]},async b=>{
    if(b!=='y') return;
    try{
      await api('DELETE',`/api/tasks/${id}`);
      tg.HapticFeedback.notificationOccurred('success');
      if(inG) await loadGTasks(curGrp.id); else await loadTasks();
    }catch(e){tg.showAlert(e.message);}
  });
}

// ── групи ─────────────────────────────────────────────────
async function loadGroups() { groups=await api('GET','/api/groups').catch(()=>[]); renderGroups(); }

function renderGroups() {
  const l=document.getElementById('group-list');
  l.innerHTML = groups.length ? groups.map((g,i)=>`
    <div class="gc" style="animation-delay:${i*.04}s" onclick="openGrp(${g.id})">
      <div class="gi ${g.role==='owner'?'own':'mem'}">${g.role==='owner'?'👥':'👁'}</div>
      <div class="ginfo"><div class="gnm">${esc(g.name)}</div><div class="gmt">${g.role==='owner'?'Власник':'Учасник'}</div></div>
      <div class="garr">›</div>
    </div>`).join('') : emp('👥','Груп поки немає');
}

async function submitGroup() {
  const name=document.getElementById('gi2').value.trim(); if(!name) return tg.showAlert('Введи назву');
  bl('gs-btn','Створюємо...');
  try{
    await api('POST','/api/groups',{name});
    tg.HapticFeedback.notificationOccurred('success'); closeModal(); await loadGroups();
  }catch(e){tg.showAlert(e.message);}
  finally{rb('gs-btn','Створити групу');}
}

async function deleteGroup() {
  tg.showPopup({title:'Видалити групу',message:`Видалити «${curGrp.name}»? Всі завдання та учасники будуть видалені.`,buttons:[{id:'y',type:'destructive',text:'Видалити'},{id:'n',type:'cancel'}]},async b=>{
    if(b!=='y') return;
    try{
      await api('DELETE',`/api/groups/${curGrp.id}`);
      tg.HapticFeedback.notificationOccurred('success');
      await loadGroups(); goBack();
    }catch(e){tg.showAlert(e.message);}
  });
}

// ── група — детальний екран ────────────────────────────────
async function openGrp(gid) {
  try {
    const d=await api('GET',`/api/groups/${gid}/members`);
    const isOwner=groups.some(g=>g.id===gid && g.role==='owner');
    curGrp={id:gid,name:d.name,isOwner};
    document.getElementById('gd-name').textContent=d.name;
    document.getElementById('gd-meta').textContent=`${d.members.length} учасн. • ${isOwner?'Ви власник':'Учасник'}`;
    document.getElementById('gfab').style.display='flex'; // всі можуть додавати завдання
    document.getElementById('bdg').style.display=isOwner?'flex':'none';
    renderMembers(d.members);
    await loadGTasks(gid);
    showScreen('group');
  }catch(e){tg.showAlert('Помилка: '+e.message);}
}

function renderMembers(members) {
  const l=document.getElementById('member-list');
  l.innerHTML = members.length ? members.map((m,i)=>{
    const isO=m.role==='owner', canR=curGrp?.isOwner && !isO;
    return `<div class="mc" style="animation-delay:${i*.04}s">
      <div class="mav">${m.first_name[0].toUpperCase()}</div>
      <div class="mi"><div class="mn">${esc(m.first_name)}</div><div class="mu">${m.username?'@'+esc(m.username):'без username'}</div></div>
      <span class="mrl ${isO?'ro':'rm'}">${isO?'👑 Власник':'Учасник'}</span>
      ${canR?`<button class="rbtn" onclick="removeMember(${m.user_id},'${esc(m.first_name)}')">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>`:''}
    </div>`;
  }).join('') : emp('👤','Учасників поки немає');
}

async function removeMember(mid, name) {
  tg.showPopup({title:'Видалити учасника',message:`Видалити ${name} з групи?`,buttons:[{id:'y',type:'destructive',text:'Видалити'},{id:'n',type:'cancel'}]},async b=>{
    if(b!=='y') return;
    try{await api('DELETE',`/api/groups/${curGrp.id}/members/${mid}`);tg.HapticFeedback.notificationOccurred('success');await openGrp(curGrp.id);}
    catch(e){tg.showAlert(e.message);}
  });
}

async function loadGTasks(gid) {
  const ts=await api('GET',`/api/groups/${gid}/tasks`).catch(()=>[]);
  document.getElementById('gtask-list').innerHTML = ts.length ? ts.map((t,i)=>tCard(t,i,true)).join('') : emp('📋','Завдань поки немає');
}

async function toggleGTask(id) {
  await api('PATCH',`/api/tasks/${id}/complete`).catch(e=>tg.showAlert(e.message));
  tg.HapticFeedback.impactOccurred('light'); await loadGTasks(curGrp.id);
}

async function submitGTask() {
  const title=document.getElementById('gti').value.trim(); if(!title) return tg.showAlert('Введи назву');
  bl('gts-btn','Зберігаємо...');
  try{
    await api('POST',`/api/groups/${curGrp.id}/tasks`,{title,task_type:sGT,
      due_date:sGT==='specific_date'?(document.getElementById('gtdi').value||null):null,
      season:sGT==='seasonal'?document.getElementById('gtsi').value:null});
    tg.HapticFeedback.notificationOccurred('success'); closeModal(); await loadGTasks(curGrp.id);
  }catch(e){tg.showAlert(e.message);}
  finally{rb('gts-btn','Додати завдання');}
}

function shareGrp() {
  if(!curGrp) return;
  const bot='your_planner_bot';
  const link=`https://t.me/${bot}?start=group_${curGrp.id}`;
  tg.showPopup({title:curGrp.name,message:'Поділись посиланням:',buttons:[{id:'s',type:'default',text:'📤 Поділитись'},{id:'c',type:'default',text:'📋 Скопіювати'},{id:'x',type:'destructive',text:'Закрити'}]},(b)=>{
    if(b==='s') tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(`Приєднуйся до групи "${curGrp.name}"`)}`);
    if(b==='c') navigator.clipboard.writeText(link).then(()=>tg.showAlert('✅ Скопійовано!'));
  });
}

// ── UI ────────────────────────────────────────────────────
function setF(f,el) { filter=f; document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active')); el.classList.add('active'); renderTasks(); }

function openMainModal() {
  const g=tabIdx===1;
  document.getElementById('mtit').textContent=g?'Нова група':'Нове завдання';
  show4(g?'f-group':'f-task');
  if(!g){document.getElementById('ti').value='';selT('specific_date',document.querySelector('#f-task .tbtn'));}
  else{document.getElementById('gi2').value='';}
  openModal();
  setTimeout(()=>(g?document.getElementById('gi2'):document.getElementById('ti')).focus(),350);
}
function openGTaskModal() {
  document.getElementById('mtit').textContent='Нове завдання групи';
  show4('f-gtask'); document.getElementById('gti').value='';
  selGT('specific_date',document.querySelector('#f-gtask .tbtn'));
  openModal(); setTimeout(()=>document.getElementById('gti').focus(),350);
}

function show4(id){['f-task','f-edit','f-group','f-gtask'].forEach(i=>document.getElementById(i).style.display=i===id?'':'none');}
function openModal(){document.getElementById('mo').classList.add('open');tg.HapticFeedback.impactOccurred('medium');}
function closeModal(){document.getElementById('mo').classList.remove('open');}
function outClose(e){if(e.target===document.getElementById('mo'))closeModal();}

function selT(t,el){sT=t;document.querySelectorAll('#f-task .tbtn').forEach(b=>b.classList.remove('active'));el.classList.add('active');document.getElementById('df').style.display=t==='specific_date'?'':'none';document.getElementById('sf').style.display=t==='seasonal'?'':'none';}
function selGT(t,el){sGT=t;document.querySelectorAll('#f-gtask .tbtn').forEach(b=>b.classList.remove('active'));el.classList.add('active');document.getElementById('gdf').style.display=t==='specific_date'?'':'none';document.getElementById('gsf').style.display=t==='seasonal'?'':'none';}

function bl(id,t){const b=document.getElementById(id);b.disabled=true;b.textContent=t;}
function rb(id,t){const b=document.getElementById(id);b.disabled=false;b.textContent=t;}

// ── картка завдання ───────────────────────────────────────
function tCard(t, i, isG) {
  const bdg={daily:`<span class="bdg bd">🔁 Щодня</span>`,specific_date:`<span class="bdg bdt">📅 По даті</span>`,seasonal:`<span class="bdg bs">🌿 Сезон</span>`}[t.task_type]||'';
  const meta=t.due_date?new Date(t.due_date).toLocaleDateString('uk-UA',{day:'numeric',month:'short'}):(t.season||'');
  const toggle=isG?`toggleGTask(${t.id})`:`toggleTask(${t.id})`;

  // Права:
  // canEdit  — автор завдання (і тільки не виконані)
  // canDelete — особисте: автор; групове: власник групи; виконані: ТАКОЖ можна видаляти
  const isAuthor = t.created_by === uid || (!t.created_by && !isG);
  const isGOwner = isG && curGrp?.isOwner;
  const canEdit   = !t.is_completed && isAuthor;
  const canDelete = isG ? isGOwner : isAuthor;

  const editFn = !isG ? `openEdit(${JSON.stringify(t).replace(/"/g,'&quot;')})` : '';

  return `<div class="tc ${t.is_completed?'done':''}" style="animation-delay:${i*.04}s">
    <div class="chk" onclick="${toggle}">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="tb" onclick="${toggle}">
      <div class="tt">${esc(t.title)}</div>
      <div class="tm">${bdg}${meta?`<span>${meta}</span>`:''}</div>
    </div>
    <div class="tact">
      ${canEdit && !isG?`<button class="ibtn ed" onclick="event.stopPropagation();${editFn}">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9.5 2.5l2 2L4 12H2v-2L9.5 2.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>`:''}
      ${canDelete?`<button class="ibtn dl" onclick="event.stopPropagation();delTask(${t.id},${isG})">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2.5h4V4M5.5 6.5v4M8.5 6.5v4M3 4l.8 7.5h6.4L11 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>`:''}
    </div>
  </div>`;
}

function emp(ic,tx){return `<div class="emp"><div class="ei">${ic}</div><p>${tx}</p></div>`;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

[['ti',submitTask],['gi2',submitGroup],['gti',submitGTask],['ei',submitEdit]].forEach(([id,fn])=>{
  document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')fn();});
});

init();
</script>
</body>
</html>
